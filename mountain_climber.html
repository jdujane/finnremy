<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mountain Climber</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: flex-start; padding: 20px; min-height: 100vh; font-family: sans-serif; }
#ui { position: relative; user-select: none; -webkit-user-select: none; max-width: 620px; width: 100%; }
#hud { display: flex; gap: 10px; align-items: center; padding: 7px 12px; background: #1e2a3a; border-bottom: 1px solid #2a3a4a; flex-wrap: wrap; font-size: 13px; color: #dde; }
#shop-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 10; justify-content: center; align-items: flex-start; padding-top: 16px; }
#shop-box { background: #1e2a3a; border-radius: 12px; border: 1px solid #3a4a5a; padding: 1.25rem; width: 360px; max-width: 96%; max-height: 88vh; overflow-y: auto; color: #dde; }
.shop-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2a3a4a; gap: 8px; }
.shop-item:last-child { border-bottom: none; }
.shop-cat { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #556; padding: 8px 0 2px; text-transform: uppercase; }
.item-info { font-size: 12px; color: #889; margin-top: 2px; }
button { cursor: pointer; border: 1px solid #3a4a5a; background: transparent; border-radius: 6px; padding: 5px 12px; font-size: 13px; color: #dde; }
button:hover { background: #2a3a4a; }
button:disabled { opacity: 0.35; cursor: default; }
#msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #1e2a3a; border: 1px solid #3a4a5a; border-radius: 12px; padding: 1.5rem 2rem; text-align: center; z-index: 20; display: none; min-width: 250px; color: #dde; }
#hint { font-size: 11px; color: #556; padding: 4px 12px; background: #161e2a; border-top: 1px solid #2a3a4a; }
</style>
</head>
<body>
<div id="ui">
  <div id="hud">
    <span style="font-weight:600;" id="stage-label">⛰ 1/20</span>
    <span style="color:#889;">Flag <span id="cp-num">0</span>/<span id="cp-total">5</span></span>
    <span>🪙 <span id="coins">0</span></span>
    <span style="color:#889;">Stamina: <span id="stamina">100</span>%</span>
    <button id="shop-btn" style="margin-left:auto;">🎒 Shop</button>
  </div>
  <canvas id="gc" width="600" height="480"></canvas>
  <div id="hint">WASD/Arrows=move &nbsp;|&nbsp; W/Up/Space=jump &nbsp;|&nbsp; E=grapple &nbsp;|&nbsp; F=sword swing &nbsp;|&nbsp; Wingsuit=glide &amp; steer</div>
  <div id="shop-overlay">
    <div id="shop-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h3 style="font-size:16px;font-weight:500;">Shop</h3>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:13px;">🪙 <span id="shop-coins">0</span></span>
          <button id="shop-close-x" style="padding:2px 9px;font-size:14px;">✕</button>
        </div>
      </div>
      <div id="shop-items"></div>
      <button id="shop-close-btn" style="margin-top:14px;width:100%;">Close Shop</button>
    </div>
  </div>
  <div id="msg">
    <div id="msg-text" style="font-size:15px;font-weight:500;margin-bottom:14px;white-space:pre-line;"></div>
    <button id="msg-btn">Continue</button>
  </div>
</div>
<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W=600, H=480, WORLD_H=6000;

// ── Shop items ────────────────────────────────────────────────────────────────
const ITEMS = [
  // Climbing gear
  { id:'chalk',    name:'Chalk',            emoji:'🪨', desc:'+25% grip, less stamina drain',              price:25,  owned:false, cat:'Climbing' },
  { id:'gloves',   name:'Gloves',           emoji:'🧤', desc:'+25% grip, prevents stamina death',          price:55,  owned:false, cat:'Climbing' },
  { id:'magnet',   name:'Mag Grips',        emoji:'🧲', desc:'+40% grip, stick to any surface',           price:100, owned:false, cat:'Climbing' },
  { id:'crampons', name:'Crampons',         emoji:'🔩', desc:'+20% speed on all terrain',                 price:65,  owned:false, cat:'Climbing' },
  { id:'shoes',    name:'Climbing Shoes',   emoji:'👟', desc:'Run faster, jump higher',                   price:45,  owned:false, cat:'Climbing' },
  { id:'grapple',  name:'Grapple Hook',     emoji:'🪝', desc:'E = shoot hook to nearest platform above',  price:110, owned:false, cat:'Climbing' },
  // Survival
  { id:'jacket',   name:'Pro Jacket',       emoji:'🧥', desc:'+30% max stamina',                          price:70,  owned:false, cat:'Survival' },
  { id:'flask',    name:'Thermos Flask',    emoji:'🍶', desc:'Stamina drains 35% slower',                 price:50,  owned:false, cat:'Survival' },
  { id:'rope',     name:'Safety Rope',      emoji:'🪢', desc:'Respawn at last checkpoint on fall',        price:60,  owned:false, cat:'Survival' },
  { id:'helmet',   name:'Pro Helmet',       emoji:'⛑',  desc:'Survive 1 fatal fall per mountain',        price:80,  owned:false, cat:'Survival' },
  { id:'energy',   name:'Energy Bar',       emoji:'⚡', desc:'Refill stamina now (one use)',              price:30,  owned:false, cat:'Survival', consumable:true, used:false },
  { id:'medkit',   name:'Med Kit',          emoji:'🩺', desc:'Refill stamina + reset knockback (one use)',price:45,  owned:false, cat:'Survival', consumable:true, used:false },
  { id:'shield',   name:'Shield',           emoji:'🛡',  desc:'Block 1 boulder or boss hit (resets each mountain)',price:75,owned:false, cat:'Survival' },
  // Mobility
  { id:'wings',    name:'Wingsuit',         emoji:'🪂', desc:'Glide in air — steer freely left/right',   price:90,  owned:false, cat:'Mobility' },
  { id:'boost',    name:'Rocket Boots',     emoji:'🚀', desc:'Double jump',                               price:120, owned:false, cat:'Mobility' },
  { id:'springpad',name:'Spring Pads',      emoji:'🌀', desc:'Jump 30% higher',                          price:85,  owned:false, cat:'Mobility' },
  { id:'jetpack',  name:'Jetpack Burst',    emoji:'🛸', desc:'Hold jump in air for 0.5s float',          price:140, owned:false, cat:'Mobility' },
  // Combat (unlocked when boss arena reached)
  { id:'sword',    name:'Iron Sword',       emoji:'⚔',  desc:'F to swing — deals 20 damage to boss',     price:0,   owned:false, cat:'Combat', freeOnBoss:true },
  { id:'fireball', name:'Fireball Scroll',  emoji:'🔥', desc:'F = throw fireball (30 dmg, one use)',      price:80,  owned:false, cat:'Combat', consumable:true, used:false },
  { id:'armor',    name:'Battle Armor',     emoji:'🦺', desc:'Take half damage from boss attacks',        price:110, owned:false, cat:'Combat' },
];

const MTNS = [
  { name:'Meadow Hill',     sky:['#87ceeb','#b0e0ff'], rock:'#8aaa7a', snow:false, diff:0.40, cp:4  },
  { name:'Pine Ridge',      sky:['#7ab8d4','#a8d8ea'], rock:'#6a8e5e', snow:false, diff:0.55, cp:5  },
  { name:'Sandy Bluff',     sky:['#e8c88a','#f5dfa0'], rock:'#c49a6e', snow:false, diff:0.70, cp:5  },
  { name:'Granite Pass',    sky:['#8899aa','#aabbcc'], rock:'#7a8a9a', snow:false, diff:0.85, cp:6  },
  { name:'Violet Peak',     sky:['#7a6a9a','#aa8acc'], rock:'#8a6aaa', snow:false, diff:1.00, cp:6  },
  { name:'Ember Spire',     sky:['#c06040','#e08060'], rock:'#a05040', snow:false, diff:1.15, cp:7  },
  { name:'Frost Crag',      sky:['#5a8aaa','#8abccc'], rock:'#5a7a9a', snow:true,  diff:1.30, cp:7  },
  { name:'Shadow Tower',    sky:['#3a3a5a','#5a5a8a'], rock:'#4a4a7a', snow:false, diff:1.45, cp:8  },
  { name:'Iron Rampart',    sky:['#5a5040','#8a7a60'], rock:'#706050', snow:false, diff:1.60, cp:8  },
  { name:'Thunder Needle',  sky:['#3a4a2a','#6a7a4a'], rock:'#8a7a30', snow:true,  diff:1.75, cp:9  },
  { name:'Crystal Spire',   sky:['#204040','#308080'], rock:'#20a09a', snow:true,  diff:1.90, cp:9  },
  { name:'Obsidian Wall',   sky:['#151520','#252535'], rock:'#353550', snow:false, diff:2.05, cp:10 },
  { name:'Storm Pinnacle',  sky:['#303850','#505878'], rock:'#3858a8', snow:true,  diff:2.20, cp:10 },
  { name:'The Summit',      sky:['#e0e8ff','#c8d8ff'], rock:'#6868cc', snow:true,  diff:2.40, cp:11 },
  { name:'Death Ridge',     sky:['#2a1a1a','#4a2a2a'], rock:'#6a3a3a', snow:false, diff:2.60, cp:12 },
  { name:'Void Ascent',     sky:['#0a0a1a','#1a1a3a'], rock:'#3a3a6a', snow:false, diff:2.80, cp:12 },
  { name:'Hellfire Peak',   sky:['#3a1000','#7a2000'], rock:'#aa4020', snow:false, diff:3.00, cp:13 },
  { name:"Glacier's Edge",  sky:['#aaccee','#cce0f8'], rock:'#6090c0', snow:true,  diff:3.20, cp:13 },
  { name:'The Final Wall',  sky:['#1a0a2a','#3a1a5a'], rock:'#5a2a8a', snow:true,  diff:3.50, cp:14 },
  { name:'APEX — The End',  sky:['#000010','#100020'], rock:'#303060', snow:true,  diff:4.00, cp:15 },
];

// ── State ─────────────────────────────────────────────────────────────────────
let G = {
  mountain:0, coins:0, coinsAtMtnStart:0,
  stamina:100, maxStamina:100, grip:1.0,
  cpClaimed:0, spawnX:70, spawnY:0, helmetHP:0, shieldHP:0, camY:0,
  bossArena:false,
  hearts:10, maxHearts:10, hitCooldown:0
};
let platforms=[], checkpoints=[], enemies=[], boulders=[], stars=[];
let pl = { x:70, y:0, vx:0, vy:0, onGround:false, w:20, h:26, facing:1, jumpsLeft:1, knockback:0, jetpackTime:0 };
let sword = { swinging:false, frame:0, cooldown:0, angle:0 };
let prevKeys={}, keys={}, prevJump=false, prevGrappleKey=false, prevSwordKey=false, prevJetKey=false;
let gameOver=false, won=false, animId=null;
let hook = { state:'idle', x:0, y:0, vx:0, vy:0, anchorX:0, anchorY:0 };

// Boss state
let boss = {
  active:false, x:250, y:0, w:60, h:80,
  hp:200, maxHp:200, vx:2, facing:-1,
  phase:1, // 1=charge, 2=slam, 3=rage
  chargeTimer:0, slamTimer:0, attackCooldown:120,
  blasts:[], // magic projectiles
  flashTimer:0, deadTimer:0, dead:false
};

const BASE_JUMP=-13.5, GRAV=0.45, BASE_SPD=3.4, GAP_X=200, GAP_Y=130;
// Boss arena Y position (above world top)
const BOSS_Y = -800;
const BOSS_PLAT_Y = BOSS_Y + 300;

function it(id){ return ITEMS.find(i=>i.id===id); }
function owns(id){ return it(id).owned; }

function seededRand(n){ return Math.abs((Math.sin(n)*43758.5453)%1); }
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}
function lighten(hex,amt){
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+amt),g=Math.min(255,parseInt(hex.slice(3,5),16)+amt),b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
  return `rgb(${r},${g},${b})`;
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function genStars(mi){
  stars=[];
  const m=MTNS[mi];
  const dark=parseInt(m.sky[0].slice(1,3),16)<60;
  if(!dark&&!G.bossArena) return;
  for(let i=0;i<100;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,a:0.3+Math.random()*0.7});
}

// ── Level generation ──────────────────────────────────────────────────────────
function genLevel(mi){
  platforms=[]; checkpoints=[]; enemies=[]; boulders=[];
  G.bossArena=false;
  platforms.push({x:0,y:WORLD_H-20,w:160,h:20});
  const m=MTNS[mi], numCP=m.cp;
  const stepY=Math.floor((WORLD_H-200)/(numCP+1));
  let px=0,pw=160,py=WORLD_H-20;
  const isFinal=mi===19;
  for(let i=0;i<=numCP;i++){
    const pw2=isFinal?130+Math.floor(Math.random()*60):55+Math.floor(Math.random()*55);
    const ty=py-Math.min(GAP_Y,stepY-8)-8;
    const pc=px+pw/2;
    const lo=Math.max(20,pc-GAP_X+10);
    const hi=Math.min(W-pw2-20,pc+GAP_X-10);
    const nx=Math.floor(lo+Math.random()*Math.max(1,hi-lo));
    platforms.push({x:nx,y:ty,w:pw2,h:13});
    checkpoints.push({x:nx+pw2/2,y:ty-30,claimed:false,isSummit:i===numCP});
    if(isFinal&&i>0&&i<numCP&&Math.random()<0.7){
      const margin=Math.floor(pw2*0.25);
      const patrolX=nx+margin, patrolW=pw2-margin*2;
      enemies.push({x:patrolX+4,y:ty-20,w:16,h:20,platX:patrolX,platW:patrolW,vx:0.75*(Math.random()<0.5?1:-1),facing:1});
    }
    px=nx; pw=pw2; py=ty;
  }
  if(isFinal) for(let i=0;i<6;i++) spawnBoulder();

  G.coinsAtMtnStart=G.coins;
  G.spawnX=70; G.spawnY=WORLD_H-70; G.camY=WORLD_H-H;
  G.helmetHP=owns('helmet')?1:0;
  G.shieldHP=owns('shield')?1:0;
  respawn(); G.stamina=G.maxStamina; G.cpClaimed=0;
  hook.state='idle'; gameOver=false; won=false;
  genStars(mi); updateHUD();
}

function enterBossArena(){
  G.bossArena=true;
  gameOver=false; won=false;
  // Big flat arena platform
  platforms=[{x:50,y:BOSS_PLAT_Y,w:500,h:20}];
  checkpoints=[];enemies=[];boulders=[];
  // Give sword free
  const sw=it('sword'); if(!sw.owned){ sw.owned=true; }
  // Reset boss
  boss.active=true; boss.dead=false; boss.deadTimer=0;
  boss.x=300; boss.y=BOSS_PLAT_Y-boss.h;
  boss.hp=200; boss.maxHp=200;
  boss.vx=2; boss.facing=-1;
  boss.phase=1; boss.chargeTimer=180; boss.attackCooldown=120;
  boss.blasts=[]; boss.flashTimer=0;
  // Spawn player left side of arena, firmly on the platform
  pl.x=90; pl.y=BOSS_PLAT_Y-pl.h-2;
  pl.vx=0; pl.vy=0; pl.onGround=true; pl.facing=1;
  pl.knockback=0; pl.jumpsLeft=owns('boost')?2:1;
  pl.jetpackTime=0;
  sword.swinging=false; sword.frame=0; sword.cooldown=0;
  hook.state='idle';
  G.stamina=G.maxStamina;
  G.shieldHP=owns('shield')?1:0;
  G.hearts=10; G.maxHearts=10; G.hitCooldown=0;
  // Set camera so arena is visible — BOSS_PLAT_Y is negative so we need negative camY
  G.camY=BOSS_PLAT_Y-H*0.65;
  // Stars always on in boss arena
  stars=[];
  for(let i=0;i<120;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,a:0.3+Math.random()*0.7});
  updateHUD();
}

function spawnBoulder(){
  boulders.push({
    x:Math.random()*(W-20), y:G.camY-200,
    vx:(Math.random()-0.5)*3, vy:1+Math.random()*2,
    r:8+Math.random()*8, rot:Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.15
  });
}

function respawn(){
  pl.x=G.spawnX; pl.y=G.spawnY;
  pl.vx=0; pl.vy=0; pl.onGround=false; pl.facing=1; pl.knockback=0; pl.jumpsLeft=owns('boost')?2:1;
  pl.jetpackTime=0; hook.state='idle'; sword.swinging=false; sword.cooldown=0;
}

// ── Collision ─────────────────────────────────────────────────────────────────
function resolveCollisions(){
  pl.onGround=false;
  for(let p of platforms){
    const ox=Math.min(pl.x+pl.w,p.x+p.w)-Math.max(pl.x,p.x);
    const oy=Math.min(pl.y+pl.h,p.y+p.h)-Math.max(pl.y,p.y);
    if(ox<=0||oy<=0) continue;
    if(oy<=ox){
      if(pl.y+pl.h/2<p.y+p.h/2){
        pl.y=p.y-pl.h;
        if(pl.vy>=0){ pl.vy=0; pl.onGround=true; pl.jumpsLeft=owns('boost')?2:1; pl.jetpackTime=0; hook.state='idle'; }
      } else { pl.y=p.y+p.h; if(pl.vy<0) pl.vy=0; }
    } else {
      pl.x+pl.w/2<p.x+p.w/2?pl.x=p.x-pl.w:pl.x=p.x+p.w; pl.vx=0;
    }
  }
}

// ── Grapple ───────────────────────────────────────────────────────────────────
function tryFireGrapple(){
  const pcx=pl.x+pl.w/2,pcy=pl.y+pl.h/2;
  let best=null,bestDist=9999;
  for(let p of platforms){
    const tx=Math.max(p.x+5,Math.min(p.x+p.w-5,pcx)),ty=p.y;
    if(ty>=pcy-10) continue;
    const d=Math.hypot(tx-pcx,ty-pcy);
    if(d<500&&d<bestDist){bestDist=d;best={tx,ty};}
  }
  if(!best) return;
  hook.state='flying'; hook.x=pcx; hook.y=pcy;
  const d=Math.hypot(best.tx-pcx,best.ty-pcy);
  hook.vx=(best.tx-pcx)/d*22; hook.vy=(best.ty-pcy)/d*22;
  hook.anchorX=best.tx; hook.anchorY=best.ty;
}

function updateGrapple(){
  if(hook.state==='idle') return;
  if(hook.state==='flying'){
    hook.x+=hook.vx; hook.y+=hook.vy;
    if(Math.hypot(hook.x-hook.anchorX,hook.y-hook.anchorY)<20){hook.state='attached';hook.x=hook.anchorX;hook.y=hook.anchorY;}
    if(hook.y<BOSS_Y-100||hook.x<-50||hook.x>W+50) hook.state='idle';
  }
  if(hook.state==='attached'){
    const pcx=pl.x+pl.w/2,pcy=pl.y+pl.h/2;
    const dx=hook.x-pcx,dy=hook.y-pcy,d=Math.hypot(dx,dy);
    if(d<18){if(pl.vy>-2)pl.vy=-4;hook.state='idle';return;}
    pl.vx+=dx/d*0.9; pl.vy+=dy/d*0.9;
    const spd=Math.hypot(pl.vx,pl.vy);
    if(spd>11){pl.vx=pl.vx/spd*11;pl.vy=pl.vy/spd*11;}
  }
}

// ── Sword ─────────────────────────────────────────────────────────────────────
function updateSword(){
  if(sword.cooldown>0) sword.cooldown--;
  if(sword.swinging){
    sword.frame++;
    sword.angle=pl.facing*(Math.PI*0.1+sword.frame*0.18);
    if(sword.frame>10){ sword.swinging=false; sword.frame=0; }
  }
  const fk=keys['f']||keys['F'];
  if(fk&&!prevSwordKey&&owns('sword')&&sword.cooldown===0){
    sword.swinging=true; sword.frame=0; sword.cooldown=28;
    // Deflect blasts
    if(G.bossArena){
      boss.blasts=boss.blasts.filter(b=>{
        const dx=b.x-(pl.x+pl.w/2),dy=b.y-(pl.y+pl.h/2),d=Math.hypot(dx,dy);
        if(d<60){b.vx=-b.vx*1.4;b.vy=-b.vy*1.4;return true;}
        return true;
      });
    }
    // Hit boss
    if(G.bossArena&&boss.active&&!boss.dead){
      const dist=Math.hypot((boss.x+boss.w/2)-(pl.x+pl.w/2),(boss.y+boss.h/2)-(pl.y+pl.h/2));
      if(dist<90){
        let dmg=owns('fireball')&&!it('fireball').used?0:20;
        dmg=20; // sword always 20
        boss.hp=Math.max(0,boss.hp-dmg);
        boss.flashTimer=8;
        // Update phase
        if(boss.hp<=0) boss.dead=true;
        else if(boss.hp<boss.maxHp*0.33) boss.phase=3;
        else if(boss.hp<boss.maxHp*0.66) boss.phase=2;
      }
    }
  }
  prevSwordKey=fk;
  // Fireball
  if((keys['f']||keys['F'])&&owns('fireball')&&!it('fireball').used&&sword.cooldown===0&&!owns('sword')){
    it('fireball').used=true;
    boss.blasts.push({x:pl.x+pl.w/2,y:pl.y+pl.h/2,vx:pl.facing*9,vy:-2,r:8,friendly:true,color:'#ff6600'});
    sword.cooldown=30;
  }
}

// ── Boss ──────────────────────────────────────────────────────────────────────
function updateBoss(){
  if(!boss.active||boss.dead) return;
  if(boss.flashTimer>0) boss.flashTimer--;

  const pcx=pl.x+pl.w/2, pcy=pl.y+pl.h/2;
  const bcx=boss.x+boss.w/2, bcy=boss.y+boss.h/2;
  boss.facing=pcx<bcx?-1:1;

  // Move boss toward player
  boss.x+=boss.vx;
  if(boss.x<55){boss.x=55; boss.vx=Math.abs(boss.vx);}
  if(boss.x+boss.w>545){boss.x=545-boss.w; boss.vx=-Math.abs(boss.vx);}
  boss.y=BOSS_PLAT_Y-boss.h;

  // Charge timer — shoot blasts and update speed
  boss.chargeTimer--;
  if(boss.chargeTimer<=0){
    boss.chargeTimer=Math.max(50,130-boss.phase*25);
    const spd=1.5+boss.phase*0.8;
    boss.vx=(pcx<bcx?-1:1)*spd;

    // Phase 1: single aimed blast
    if(boss.phase>=1){
      const dx=pcx-bcx, dy=pcy-bcy, d=Math.hypot(dx,dy)||1;
      boss.blasts.push({x:bcx, y:bcy, vx:dx/d*4.5, vy:dy/d*4.5, r:12, friendly:false, color:'#aa00ff'});
    }
    // Phase 2: add a second blast offset
    if(boss.phase>=2){
      const dx=pcx-bcx, dy=pcy-bcy, d=Math.hypot(dx,dy)||1;
      boss.blasts.push({x:bcx, y:bcy, vx:dx/d*5.5+1.5, vy:dy/d*5.5, r:10, friendly:false, color:'#ff00cc'});
    }
    // Phase 3: triple spread
    if(boss.phase>=3){
      for(let a=-0.5;a<=0.5;a+=0.5){
        const dx=pcx-bcx, dy=pcy-bcy, d=Math.hypot(dx,dy)||1;
        const nx=dx/d, ny=dy/d;
        boss.blasts.push({
          x:bcx, y:bcy,
          vx:(nx*Math.cos(a)-ny*Math.sin(a))*6.5,
          vy:(nx*Math.sin(a)+ny*Math.cos(a))*6.5,
          r:9, friendly:false, color:'#ff4400'
        });
      }
    }
  }

  // Update blasts — use a simple time-to-live instead of Y check
  for(let i=boss.blasts.length-1;i>=0;i--){
    const b=boss.blasts[i];
    b.x+=b.vx; b.y+=b.vy;
    b.life=(b.life||0)+1;
    // Remove if off screen horizontally, gone past arena floor, or lived too long
    const screenY=ws(b.y);
    if(screenY>H+40||screenY<-100||b.x<-20||b.x>W+20||b.life>240){
      boss.blasts.splice(i,1); continue;
    }

    if(!b.friendly){
      // Hit player — check using world coords
      const dx=b.x-pcx, dy=b.y-pcy;
      if(Math.hypot(dx,dy)<b.r+12){
        boss.blasts.splice(i,1);
        if(G.shieldHP>0){ G.shieldHP=0; continue; }
        if(G.hitCooldown>0) continue; // brief invincibility after hit
        const dmg=owns('armor')?1:1; // always 1 heart
        loseHeart(dmg, 'Blasted! 💀');
        pl.vx=(pl.x<b.x?-1:1)*7; pl.vy=-6; pl.knockback=20;
      }
    } else {
      // Friendly blast hits boss
      const dx=b.x-bcx, dy=b.y-bcy;
      if(Math.hypot(dx,dy)<boss.w/2+b.r){
        boss.hp=Math.max(0,boss.hp-30);
        boss.flashTimer=8;
        boss.blasts.splice(i,1);
        checkBossPhase();
      }
    }
  }

  // Boss body touches player
  const ox=Math.min(pl.x+pl.w,boss.x+boss.w)-Math.max(pl.x,boss.x);
  const oy=Math.min(pl.y+pl.h,boss.y+boss.h)-Math.max(pl.y,boss.y);
  if(ox>4&&oy>4&&G.hitCooldown===0){
    if(G.shieldHP>0){ G.shieldHP=0; pl.vx=(pl.x<bcx?-1:1)*9; pl.vy=-7; pl.knockback=30; return; }
    loseHeart(owns('armor')?1:2, 'Crushed! 💀');
    pl.vx=(pl.x<bcx?-1:1)*9; pl.vy=-7; pl.knockback=30;
  }

  if(G.hitCooldown>0) G.hitCooldown--;
}

function loseHeart(amount, deathMsg){
  G.hearts=Math.max(0, G.hearts-amount);
  G.hitCooldown=45; // ~0.75s invincibility after hit
  if(G.hearts<=0){
    triggerDeath(deathMsg);
  }
}

function checkBossPhase(){
  if(boss.hp<=0){ boss.dead=true; return; }
  if(boss.hp<boss.maxHp*0.33) boss.phase=3;
  else if(boss.hp<boss.maxHp*0.66) boss.phase=2;
}

// ── Enemies (level 20) ────────────────────────────────────────────────────────
function updateEnemies(){
  if(G.mountain!==19||G.bossArena) return;
  for(let e of enemies){
    e.x+=e.vx;
    if(e.x<=e.platX){e.x=e.platX;e.vx=Math.abs(e.vx);e.facing=1;}
    if(e.x+e.w>=e.platX+e.platW){e.x=e.platX+e.platW-e.w;e.vx=-Math.abs(e.vx);e.facing=-1;}
    const ox=Math.min(pl.x+pl.w,e.x+e.w)-Math.max(pl.x,e.x);
    const oy=Math.min(pl.y+pl.h,e.y+e.h)-Math.max(pl.y,e.y);
    if(ox>4&&oy>4){
      if(G.shieldHP>0){G.shieldHP=0;return;}
      pl.vx=(pl.x+pl.w/2<e.x+e.w/2?-1:1)*9; pl.vy=-5; pl.knockback=20; pl.onGround=false;
    }
  }
}

function updateBoulders(){
  if(G.mountain!==19||G.bossArena) return;
  if(Math.random()<0.012) spawnBoulder();
  for(let i=boulders.length-1;i>=0;i--){
    const b=boulders[i];
    b.x+=b.vx; b.y+=b.vy; b.vy+=0.3; b.rot+=b.rotV;
    if(b.y>WORLD_H+200){boulders.splice(i,1);continue;}
    const pcx=pl.x+pl.w/2,pcy=pl.y+pl.h/2;
    if(Math.hypot(b.x-pcx,b.y-pcy)<b.r+12){
      // Sword deflects boulders
      if(sword.swinging){boulders.splice(i,1);continue;}
      if(G.shieldHP>0){G.shieldHP=0;boulders.splice(i,1);continue;}
      pl.vx=(pcx<b.x?-1:1)*7; pl.vy=-6; pl.onGround=false;
      boulders.splice(i,1);
    }
  }
}

// ── Death ─────────────────────────────────────────────────────────────────────
function triggerDeath(msg){
  const lost=G.coins-G.coinsAtMtnStart;
  G.coins=G.coinsAtMtnStart; // lose all coins earned this mountain
  gameOver=true;
  const lostMsg=lost>0?`\nLost ${lost} coins earned this mountain 💸`:'';
  showMsg(msg+lostMsg,'Try Again',()=>{
    hideMsg();
    if(G.bossArena){ gameOver=false; enterBossArena(); loop(); return; }
    respawn(); G.stamina=G.maxStamina; G.shieldHP=owns('shield')?1:0;
    gameOver=false; loop();
  });
}

// ── Main update ───────────────────────────────────────────────────────────────
function update(){
  if(gameOver||won) return;

  // Boss win check
  if(G.bossArena&&boss.dead){
    boss.deadTimer=(boss.deadTimer||0)+1;
    // Animate boss death for 90 frames then show win
    if(boss.deadTimer===90){
      won=true;
      showMsg('🏆 THE MOUNTAIN KING IS DEFEATED! 🏆\n\nYou conquered all 20 mountains\nand slew the boss!\n\nFinal coins: '+G.coins,'Play Again',()=>{
        hideMsg();
        G.mountain=0;G.coins=0;G.coinsAtMtnStart=0;
        ITEMS.forEach(i=>{i.owned=false;if(i.consumable)i.used=false;});
        G.maxStamina=100;G.stamina=100;G.grip=1.0;G.bossArena=false;
        genLevel(0);loop();
      });
    }
    updateCamera(); return;
  }

  const m=MTNS[Math.min(G.mountain,19)];
  const groundSpd=BASE_SPD*(owns('shoes')?1.25:1)*(owns('crampons')?1.2:1);
  const jumpPow=BASE_JUMP*(owns('shoes')?1.08:1)*(owns('springpad')?1.3:1);
  const drain=0.028*m.diff/G.grip*(owns('flask')?0.65:1);

  const left=keys['ArrowLeft']||keys['a']||keys['A'];
  const right=keys['ArrowRight']||keys['d']||keys['D'];

  if(pl.knockback>0){ pl.knockback--; }
  else {
    if(pl.onGround){
      if(left){pl.vx=-groundSpd;pl.facing=-1;}
      else if(right){pl.vx=groundSpd;pl.facing=1;}
      else pl.vx*=0.55;
    } else {
      if(owns('wings')){
        if(left){pl.vx=Math.max(pl.vx-0.6,-groundSpd*1.15);pl.facing=-1;}
        else if(right){pl.vx=Math.min(pl.vx+0.6,groundSpd*1.15);pl.facing=1;}
        else pl.vx*=0.98;
        if(pl.vy>2) pl.vy*=0.86;
      } else {
        if(left){pl.vx=Math.max(pl.vx-0.2,-groundSpd);pl.facing=-1;}
        else if(right){pl.vx=Math.min(pl.vx+0.2,groundSpd);pl.facing=1;}
        else pl.vx*=0.92;
      }
    }
  }

  // Jump
  const jumpKey=keys['ArrowUp']||keys['w']||keys['W']||keys[' '];
  if(jumpKey&&!prevJump&&pl.jumpsLeft>0){pl.vy=jumpPow;pl.jumpsLeft--;pl.onGround=false;}
  prevJump=jumpKey;

  // Jetpack float
  if(owns('jetpack')&&jumpKey&&!pl.onGround&&pl.jumpsLeft===0){
    pl.jetpackTime=(pl.jetpackTime||0)+1;
    if(pl.jetpackTime<30) pl.vy=Math.max(pl.vy-0.4,-3);
  } else { pl.jetpackTime=0; }

  // Grapple
  const gk=!!(keys['e']||keys['E']);
  if(gk&&!prevGrappleKey&&owns('grapple')){
    if(hook.state==='idle') tryFireGrapple(); else hook.state='idle';
  }
  prevGrappleKey=gk;

  updateSword();
  updateGrapple();
  updateEnemies();
  updateBoulders();
  updateBoss();

  pl.vy+=GRAV; if(pl.vy>16) pl.vy=16;
  pl.x+=pl.vx; pl.y+=pl.vy;
  // In boss arena clamp to arena
  if(G.bossArena){ pl.x=Math.max(50,Math.min(W-50-pl.w,pl.x)); }
  else { pl.x=Math.max(0,Math.min(W-pl.w,pl.x)); }
  resolveCollisions();

  if(pl.onGround&&Math.abs(pl.vx)>0.5) G.stamina=Math.max(0,G.stamina-drain);

  updateCamera();

  // Fell
  const fallLimit=G.bossArena?BOSS_PLAT_Y+200:WORLD_H+80;
  if(pl.y>fallLimit){
    if(owns('helmet')&&G.helmetHP>0){G.helmetHP--;respawn();return;}
    if(owns('rope')&&!G.bossArena){respawn();return;}
    triggerDeath('You fell! 😬');
    return;
  }

  // Stamina death
  if(G.stamina<=0&&!owns('gloves')){
    triggerDeath('Out of stamina! 😮‍💨');
    return;
  }

  // Checkpoints
  if(!G.bossArena){
    for(let cp of checkpoints){
      if(cp.claimed) continue;
      const dx=Math.abs((pl.x+pl.w/2)-cp.x),dy=Math.abs((pl.y+pl.h/2)-cp.y);
      if(dx<26&&dy<38){
        cp.claimed=true; G.cpClaimed++;
        const reward=cp.isSummit?35+G.mountain*14:14+G.mountain*5;
        G.coins+=reward;
        if(!cp.isSummit){G.spawnX=cp.x-pl.w/2;G.spawnY=cp.y+14;}
        updateHUD();
        if(cp.isSummit){
          const eb=it('energy'); if(eb&&eb.consumable){eb.used=false;eb.owned=false;}
          const mb=it('medkit'); if(mb&&mb.consumable){mb.used=false;mb.owned=false;}
          if(G.mountain<19){
            won=true;
            showMsg(`${MTNS[G.mountain].name} conquered!\n+${reward} coins 🏆`,'Next Mountain',()=>{
              hideMsg();G.mountain++;genLevel(G.mountain);won=false;loop();
            });
          } else {
            // Level 20 beaten → boss arena
            won=true;
            if(animId){cancelAnimationFrame(animId);animId=null;}
            showMsg('APEX CLEARED! 🔥\n\nA dark portal opens above...\nEnter the Boss Arena!','Enter Arena',()=>{
              hideMsg();
              won=false;
              gameOver=false;
              enterBossArena();
              loop();
            });
          }
        }
      }
    }
  }
  updateHUD();
}

function updateCamera(){
  if(G.bossArena){
    // In boss arena keep camera fixed so platform is nicely centered
    const targetCam=BOSS_PLAT_Y-H*0.65;
    G.camY+=(targetCam-G.camY)*0.08;
    return;
  }
  const targetCam=pl.y-H*0.52;
  G.camY+=(targetCam-G.camY)*0.12;
  G.camY=Math.max(0,Math.min(WORLD_H-H,G.camY));
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function ws(wy){ return wy-G.camY; }

function drawSky(){
  if(G.bossArena){
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#000000');g.addColorStop(1,'#1a0030');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    return;
  }
  const m=MTNS[G.mountain];
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,m.sky[0]);g.addColorStop(1,m.sky[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawStars(){
  for(let s of stars){ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
}

function drawMountainBg(){
  if(G.bossArena){
    // Eerie purple pillars
    ctx.fillStyle='rgba(80,0,120,0.3)';
    for(let i=0;i<6;i++){ctx.fillRect(60+i*90,0,12,H);}
    return;
  }
  const m=MTNS[G.mountain];
  const camOff=(G.camY*0.12)%H;
  ctx.save();
  for(let layer=0;layer<3;layer++){
    const alpha=0.15+layer*0.12,yBase=H*0.6+layer*35;
    ctx.fillStyle=`rgba(${hexToRgb(m.rock)},${alpha})`;
    ctx.beginPath();ctx.moveTo(-20,yBase);
    const seed=G.mountain*1000+layer*300,step=70;
    for(let xi=0;xi<W+80;xi+=step){
      const peakH=50+Math.abs(seededRand(seed+xi))*100-layer*15;
      const jog=(seededRand(seed+xi+7)*20)-10,scrollY=camOff*(0.04+layer*0.02);
      ctx.lineTo(xi+jog,yBase-peakH*0.4-scrollY);
      ctx.lineTo(xi+step*0.5+jog,yBase-peakH-scrollY);
      ctx.lineTo(xi+step+jog,yBase-peakH*0.3-scrollY);
    }
    ctx.lineTo(W+20,yBase);ctx.lineTo(W+20,H);ctx.lineTo(-20,H);ctx.closePath();ctx.fill();
    if(m.snow&&layer===0){
      ctx.fillStyle='rgba(255,255,255,0.22)';
      for(let xi=0;xi<W+80;xi+=step){
        const peakH=50+Math.abs(seededRand(seed+xi))*100;
        const jog=(seededRand(seed+xi+7)*20)-10,scrollY=camOff*0.04,cap=peakH*0.28;
        ctx.beginPath();
        ctx.moveTo(xi+step*0.5+jog-cap*0.6,yBase-peakH+cap-scrollY);
        ctx.lineTo(xi+step*0.5+jog,yBase-peakH-scrollY);
        ctx.lineTo(xi+step*0.5+jog+cap*0.5,yBase-peakH+cap-scrollY);
        ctx.closePath();ctx.fill();
      }
    }
  }
  ctx.restore();
}

function drawPlatforms(){
  const m=G.bossArena?{rock:'#443355',snow:false}:MTNS[G.mountain];
  platforms.forEach((p,i)=>{
    const sy=ws(p.y);if(sy>H+20||sy+p.h<-20)return;
    if(G.bossArena){
      // Glowing boss arena floor
      const g=ctx.createLinearGradient(p.x,sy,p.x,sy+p.h);
      g.addColorStop(0,'#6030a0');g.addColorStop(1,'#301060');
      ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(p.x,sy,p.w,p.h,4);ctx.fill();
      ctx.strokeStyle='rgba(180,100,255,0.6)';ctx.lineWidth=1.5;ctx.stroke();
      // Rune marks
      ctx.fillStyle='rgba(200,150,255,0.25)';
      for(let rx=p.x+30;rx<p.x+p.w-20;rx+=60){ctx.beginPath();ctx.arc(rx,sy+6,4,0,Math.PI*2);ctx.fill();}
    } else {
      const g2=ctx.createLinearGradient(p.x,sy,p.x,sy+p.h);
      g2.addColorStop(0,lighten(i===0?'#6a5a45':m.rock,20));
      g2.addColorStop(1,i===0?'#5a4a35':m.rock);
      ctx.fillStyle=g2;ctx.beginPath();ctx.roundRect(p.x,sy,p.w,p.h,3);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.5;ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(p.x+4,sy+2);ctx.lineTo(p.x+p.w-4,sy+2);ctx.stroke();
      if(m.snow&&i>0){ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.roundRect(p.x,sy,p.w,4,2);ctx.fill();}
      if(G.mountain===19&&i>0){ctx.strokeStyle='rgba(200,50,50,0.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(p.x,sy,p.w,p.h,3);ctx.stroke();}
    }
  });
}

function drawCheckpoints(){
  checkpoints.forEach(cp=>{
    if(cp.claimed)return;
    const sy=ws(cp.y);if(sy>H+40||sy<-60)return;
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cp.x,sy+6);ctx.lineTo(cp.x,sy-22);ctx.stroke();
    ctx.strokeStyle='#c8b860';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cp.x,sy+6);ctx.lineTo(cp.x,sy-22);ctx.stroke();
    if(cp.isSummit){
      ctx.fillStyle='#ffe040';ctx.shadowColor='#ffe040';ctx.shadowBlur=8;
      drawStar(cp.x+10,sy-22,5,13,6);ctx.fill();ctx.shadowBlur=0;
    } else {
      ctx.fillStyle='#e8c000';ctx.strokeStyle='#b09000';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cp.x,sy-22);ctx.lineTo(cp.x+20,sy-14);ctx.lineTo(cp.x,sy-6);ctx.closePath();
      ctx.fill();ctx.stroke();
    }
  });
}

function drawStar(cx,cy,spikes,outerR,innerR){
  let rot=Math.PI/2*3,step=Math.PI/spikes;
  ctx.beginPath();ctx.moveTo(cx,cy-outerR);
  for(let i=0;i<spikes;i++){ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR);rot+=step;ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR);rot+=step;}
  ctx.lineTo(cx,cy-outerR);ctx.closePath();
}

function drawBoss(){
  if(!G.bossArena||(!boss.active&&!boss.dead)) return;
  const sy=ws(boss.y), cx=boss.x+boss.w/2;
  const flash=boss.flashTimer>0&&boss.flashTimer%2===0;
  const alpha=boss.dead?Math.max(0,1-(boss.deadTimer||0)/60):1;
  if(boss.dead&&(boss.deadTimer||0)>0){
    const t=boss.deadTimer||0;
    for(let i=0;i<12;i++){
      const a=i/12*Math.PI*2,r=t*3.5,ea=Math.max(0,1-t/60);
      ctx.fillStyle="rgba(255,"+Math.round(80+i*14)+",0,"+ea+")";
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,sy+boss.h/2+Math.sin(a)*r,Math.max(1,8*ea),0,Math.PI*2);ctx.fill();
    }
    return;
  }
  ctx.save();ctx.globalAlpha=alpha;
  const sB=flash?"#ffffff":(boss.phase===3?"#6a2000":boss.phase===2?"#4a3020":"#3a4050");
  const sM=flash?"#dddddd":(boss.phase===3?"#8a3010":boss.phase===2?"#5a4030":"#4a5060");
  const sD=flash?"#aaaaaa":(boss.phase===3?"#3a1000":boss.phase===2?"#2a1808":"#1a2030");
  const eyeC=boss.phase===3?"#ff2200":boss.phase===2?"#ff8800":"#22ccff";
  const glowC=boss.phase===3?"#ff4400":boss.phase===2?"#ffaa00":"#44aaff";
  const wc=Date.now()*0.008,ls=Math.sin(wc)*10*(Math.abs(boss.vx)>0.1?1:0),rs=-ls;
  // Legs
  ctx.fillStyle=sM;ctx.beginPath();ctx.roundRect(boss.x+8,sy+boss.h-22,14,22+ls,3);ctx.fill();
  ctx.strokeStyle=sD;ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=sB;ctx.beginPath();ctx.ellipse(boss.x+15,sy+boss.h+ls,12,6,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle=sD;ctx.stroke();
  ctx.fillStyle=sM;ctx.beginPath();ctx.roundRect(boss.x+boss.w-22,sy+boss.h-22,14,22+rs,3);ctx.fill();
  ctx.strokeStyle=sD;ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=sB;ctx.beginPath();ctx.ellipse(boss.x+boss.w-15,sy+boss.h+rs,12,6,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle=sD;ctx.stroke();
  // Body
  const bg=ctx.createLinearGradient(boss.x,sy+18,boss.x+boss.w,sy+boss.h);
  bg.addColorStop(0,flash?"#fff":sM);bg.addColorStop(0.4,flash?"#eee":sB);bg.addColorStop(1,flash?"#ccc":sD);
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(boss.x,sy+18,boss.w,boss.h-22,8);ctx.fill();
  ctx.strokeStyle=boss.phase===3?"#ff4400":boss.phase===2?"#ff8800":"rgba(100,140,200,0.5)";ctx.lineWidth=2;ctx.stroke();
  if(!flash){
    ctx.strokeStyle="rgba(0,0,0,0.25)";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(boss.x+6,sy+30);ctx.lineTo(boss.x+boss.w-6,sy+30);ctx.stroke();
    ctx.beginPath();ctx.moveTo(boss.x+8,sy+44);ctx.lineTo(boss.x+boss.w-8,sy+44);ctx.stroke();
    ctx.beginPath();ctx.moveTo(boss.x+5,sy+58);ctx.lineTo(boss.x+boss.w-5,sy+58);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,sy+18);ctx.lineTo(cx,sy+boss.h-22);ctx.stroke();
    // Chest gem
    const gc=boss.phase===3?"#ff3300":boss.phase===2?"#ff9900":"#2288ff";
    ctx.fillStyle=gc;ctx.shadowColor=gc;ctx.shadowBlur=12;
    ctx.beginPath();ctx.moveTo(cx,sy+34);ctx.lineTo(cx+7,sy+42);ctx.lineTo(cx,sy+50);ctx.lineTo(cx-7,sy+42);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle="rgba(255,255,255,0.6)";ctx.beginPath();ctx.arc(cx-2,sy+39,2.5,0,Math.PI*2);ctx.fill();
  }
  // Shoulders
  ctx.fillStyle=flash?"#ddd":sM;ctx.beginPath();ctx.ellipse(boss.x-2,sy+26,20,15,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle=sD;ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.ellipse(boss.x+boss.w+2,sy+26,20,15,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Arms
  const aw=boss.facing*Math.sin(wc*0.6)*8;
  ctx.strokeStyle=flash?"#fff":sM;ctx.lineWidth=14;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(boss.x-8,sy+30);ctx.quadraticCurveTo(boss.x-22,sy+48,boss.x-18,sy+68+aw);ctx.stroke();
  ctx.beginPath();ctx.moveTo(boss.x+boss.w+8,sy+30);ctx.quadraticCurveTo(boss.x+boss.w+22,sy+48,boss.x+boss.w+18,sy+68-aw);ctx.stroke();
  ctx.fillStyle=flash?"#fff":sM;ctx.beginPath();ctx.arc(boss.x-18,sy+70+aw,12,0,Math.PI*2);ctx.fill();ctx.strokeStyle=sD;ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(boss.x+boss.w+18,sy+70-aw,12,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Head
  const hg=ctx.createLinearGradient(boss.x+8,sy-4,boss.x+boss.w-8,sy+24);
  hg.addColorStop(0,flash?"#fff":sM);hg.addColorStop(0.5,flash?"#eee":sB);hg.addColorStop(1,flash?"#ccc":sD);
  ctx.fillStyle=hg;ctx.beginPath();ctx.roundRect(boss.x+6,sy-2,boss.w-12,28,5);ctx.fill();
  ctx.strokeStyle=boss.phase===3?"#ff2200":boss.phase===2?"rgba(255,140,0,0.7)":"rgba(80,120,200,0.5)";ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=flash?"#ddd":sD;ctx.beginPath();ctx.roundRect(boss.x+6,sy+10,boss.w-12,7,3);ctx.fill();
  // Eyes
  const ef=boss.facing;
  ctx.shadowColor=glowC;ctx.shadowBlur=15;ctx.fillStyle=eyeC;
  ctx.beginPath();ctx.ellipse(cx+ef*9,sy+7,8,6,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+ef*9-ef*20,sy+7,6,5,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle="rgba(0,0,0,0.7)";
  ctx.beginPath();ctx.ellipse(cx+ef*9+ef*2,sy+7,3,4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+ef*9-ef*20+ef*2,sy+7,2,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.8)";ctx.beginPath();ctx.arc(cx+ef*7,sy+5,1.5,0,Math.PI*2);ctx.fill();
  // Crown spikes
  const sc=flash?"#eee":(boss.phase===3?"#882200":boss.phase===2?"#664400":"#445566");
  for(let s=0;s<6;s++){const sx=boss.x+6+s*(boss.w-12)/5;ctx.fillStyle=sc;ctx.beginPath();ctx.moveTo(sx,sy-2);ctx.lineTo(sx+5,sy-16-s%2*6);ctx.lineTo(sx+10,sy-2);ctx.closePath();ctx.fill();}
  // Cracks
  if(!flash){
    const hp=boss.hp/boss.maxHp;
    ctx.strokeStyle=boss.phase===3?"rgba(255,80,0,0.8)":"rgba(0,0,0,0.4)";ctx.lineWidth=1.5;
    if(hp<0.9){ctx.beginPath();ctx.moveTo(boss.x+14,sy+25);ctx.lineTo(boss.x+22,sy+40);ctx.lineTo(boss.x+18,sy+55);ctx.stroke();}
    if(hp<0.7){ctx.beginPath();ctx.moveTo(boss.x+boss.w-14,sy+20);ctx.lineTo(boss.x+boss.w-24,sy+38);ctx.stroke();}
    if(hp<0.5){ctx.beginPath();ctx.moveTo(cx+5,sy+18);ctx.lineTo(cx+14,sy+36);ctx.lineTo(cx+8,sy+52);ctx.stroke();}
    if(boss.phase===3){ctx.shadowColor="#ff4400";ctx.shadowBlur=8;ctx.strokeStyle="rgba(255,120,0,0.6)";ctx.beginPath();ctx.moveTo(boss.x+14,sy+25);ctx.lineTo(boss.x+22,sy+40);ctx.stroke();ctx.shadowBlur=0;}
  }
  ctx.restore();
  // Blasts
  const t2=Date.now()*0.005;
  for(let b of boss.blasts){
    const bsy=ws(b.y);if(bsy>H+30||bsy<-30)continue;
    if(b.friendly){
      ctx.fillStyle="#ff6600";ctx.shadowColor="#ff6600";ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(b.x,bsy,b.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#ffcc00";ctx.beginPath();ctx.arc(b.x-b.vx*0.4,bsy-b.vy*0.4,b.r*0.5,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    } else {
      const pulse=0.85+Math.sin(t2*3+b.x)*0.15;
      ctx.shadowColor=b.color;ctx.shadowBlur=18;
      ctx.fillStyle=b.color+"bb";ctx.beginPath();ctx.arc(b.x,bsy,b.r*pulse,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=8;ctx.fillStyle="rgba(255,255,255,0.9)";ctx.beginPath();ctx.arc(b.x,bsy,b.r*0.4,0,Math.PI*2);ctx.fill();
      for(let s=0;s<3;s++){const sa=t2*4+s*(Math.PI*2/3),sr=b.r+4;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x+Math.cos(sa)*sr,bsy+Math.sin(sa)*sr,2.5,0,Math.PI*2);ctx.fill();}
      ctx.shadowBlur=0;
    }
  }
  // HP bar
  const barW=140,barX=cx-barW/2,barSy=ws(BOSS_PLAT_Y)-36;
  ctx.fillStyle="rgba(0,0,0,0.6)";ctx.beginPath();ctx.roundRect(barX-2,barSy-2,barW+4,16,4);ctx.fill();
  ctx.fillStyle="rgba(40,40,40,0.8)";ctx.beginPath();ctx.roundRect(barX,barSy,barW,12,3);ctx.fill();
  const hpP=boss.hp/boss.maxHp,bCol=hpP>0.66?"#22cc22":hpP>0.33?"#ff9900":"#ff2200";
  ctx.fillStyle=bCol;ctx.shadowColor=bCol;ctx.shadowBlur=6;
  ctx.beginPath();ctx.roundRect(barX,barSy,barW*hpP,12,3);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle="rgba(255,255,255,0.85)";ctx.font="bold 8px sans-serif";ctx.textAlign="center";
  ctx.fillText("MOUNTAIN KING  "+boss.hp+"/"+boss.maxHp,cx,barSy+9);ctx.textAlign="left";
  if(boss.phase>1){ctx.fillStyle=boss.phase===3?"#ff4400":"#ff9900";ctx.font="bold 8px sans-serif";ctx.textAlign="center";ctx.fillText(boss.phase===3?"⚠ RAGE MODE":"★ PHASE "+boss.phase,cx,barSy-6);ctx.textAlign="left";}
}
function drawEnemies(){
  if(G.mountain!==19||G.bossArena) return;
  for(let e of enemies){
    const sy=ws(e.y);if(sy>H+40||sy<-40)continue;
    const cx=e.x+e.w/2;
    ctx.fillStyle='#cc2020';ctx.beginPath();ctx.roundRect(e.x,sy+8,e.w,e.h-8,3);ctx.fill();
    ctx.fillStyle='#dd4040';ctx.beginPath();ctx.arc(cx,sy+5,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(cx+(e.facing>0?3:-3),sy+4,2.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#882222';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx-5,sy-2);ctx.lineTo(cx-7,sy-9);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+5,sy-2);ctx.lineTo(cx+7,sy-9);ctx.stroke();
    ctx.strokeStyle='#cc2020';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(e.x,sy+12);ctx.lineTo(e.x-8,sy+18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(e.x+e.w,sy+12);ctx.lineTo(e.x+e.w+8,sy+18);ctx.stroke();
    ctx.fillStyle='#882222';ctx.fillRect(e.x+2,sy+e.h-2,5,6);ctx.fillRect(e.x+e.w-7,sy+e.h-2,5,6);
  }
}

function drawBoulders(){
  if(G.mountain!==19||G.bossArena) return;
  for(let b of boulders){
    const sy=ws(b.y);if(sy>H+40||sy<-40)continue;
    ctx.save();ctx.translate(b.x,sy);ctx.rotate(b.rot);
    const g=ctx.createRadialGradient(-b.r*0.3,-b.r*0.3,b.r*0.1,0,0,b.r);
    g.addColorStop(0,'#aaa');g.addColorStop(0.6,'#666');g.addColorStop(1,'#333');
    ctx.fillStyle=g;ctx.beginPath();
    ctx.moveTo(b.r,0);
    for(let a=0;a<Math.PI*2;a+=Math.PI/4){const j=0.7+seededRand(Math.floor(b.x)+a*10)*0.5;ctx.lineTo(Math.cos(a)*b.r*j,Math.sin(a)*b.r*j);}
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  }
}

function drawGrapple(){
  if(hook.state==='idle')return;
  const pcx=pl.x+pl.w/2,pcy=ws(pl.y+pl.h/2),hx=hook.x,hy=ws(hook.y);
  ctx.save();ctx.strokeStyle='#dd8800';ctx.lineWidth=2;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(pcx,pcy);ctx.lineTo(hx,hy);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
  ctx.fillStyle=hook.state==='attached'?'#ff2200':'#ff8800';
  ctx.beginPath();ctx.arc(hx,hy,5,0,Math.PI*2);ctx.fill();
}

function drawSwordSwing(){
  if(!sword.swinging||!owns('sword'))return;
  const sy=ws(pl.y),cx=pl.x+pl.w/2;
  const ang=sword.angle;
  ctx.save();ctx.translate(cx,sy+14);ctx.rotate(ang);
  // Blade
  ctx.strokeStyle='rgba(200,220,255,0.9)';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-36);ctx.stroke();
  // Edge glint
  ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(2,-36);ctx.stroke();
  // Cross guard
  ctx.strokeStyle='#aa8822';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(-8,-6);ctx.lineTo(8,-6);ctx.stroke();
  // Swing arc
  ctx.strokeStyle='rgba(180,220,255,0.3)';ctx.lineWidth=18;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(0,0,36,-Math.PI/2,ang-Math.PI/2);ctx.stroke();
  ctx.restore();
}

function drawPlayer(){
  const sy=ws(pl.y),cx=pl.x+pl.w/2,f=pl.facing;
  const bodyCol=owns('jacket')?'#0a2a5f':'#3a6abf';
  const legCol=owns('crampons')?'#333':(owns('shoes')?'#1a1a2a':'#2a4a8f');
  const bootCol=owns('shoes')?'#d4a800':(owns('crampons')?'#555':'#1a2a5f');
  const helmetCol=owns('helmet')?'#d09000':'#e05010';

  if(owns('wings')&&!pl.onGround){
    ctx.fillStyle='#7020af';
    ctx.beginPath();ctx.moveTo(pl.x,sy+12);ctx.lineTo(pl.x-20,sy+28);ctx.lineTo(pl.x,sy+22);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(pl.x+pl.w,sy+12);ctx.lineTo(pl.x+pl.w+20,sy+28);ctx.lineTo(pl.x+pl.w,sy+22);ctx.closePath();ctx.fill();
  }

  // Legs
  ctx.fillStyle=legCol;ctx.fillRect(pl.x+2,sy+pl.h-7,7,9);ctx.fillRect(pl.x+pl.w-9,sy+pl.h-7,7,9);
  ctx.fillStyle=bootCol;
  ctx.beginPath();ctx.roundRect(pl.x-1,sy+pl.h+1,10,6,2);ctx.fill();
  ctx.beginPath();ctx.roundRect(pl.x+pl.w-9,sy+pl.h+1,10,6,2);ctx.fill();
  if(owns('crampons')){ctx.fillStyle='#aaa';for(let s=0;s<3;s++){ctx.fillRect(pl.x+s*4,sy+pl.h+7,2,3);ctx.fillRect(pl.x+pl.w-8+s*4,sy+pl.h+7,2,3);}}

  // Battle armor overlay
  if(owns('armor')){
    ctx.fillStyle='rgba(100,120,180,0.5)';ctx.beginPath();ctx.roundRect(pl.x-2,sy+9,pl.w+4,pl.h-8,3);ctx.fill();
    ctx.strokeStyle='#8090cc';ctx.lineWidth=1;ctx.stroke();
  }

  const bg=ctx.createLinearGradient(pl.x,sy+10,pl.x+pl.w,sy+pl.h);
  bg.addColorStop(0,lighten(bodyCol,15));bg.addColorStop(1,bodyCol);
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(pl.x,sy+10,pl.w,pl.h-10,3);ctx.fill();
  if(owns('jacket')){ctx.fillStyle='#8090d0';ctx.fillRect(pl.x+3,sy+11,3,pl.h-12);ctx.fillRect(pl.x+pl.w-6,sy+11,3,pl.h-12);}
  if(owns('rope')){ctx.strokeStyle='#bb7700';ctx.lineWidth=2;ctx.beginPath();ctx.arc(pl.x+pl.w-2,sy+14,4,0,Math.PI*1.7);ctx.stroke();}
  if(owns('flask')){ctx.fillStyle='#b07020';ctx.beginPath();ctx.roundRect(pl.x-5,sy+16,4,7,1);ctx.fill();}
  if(owns('grapple')){ctx.fillStyle='#777';ctx.fillRect(pl.x+pl.w-4,sy+19,4,3);ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pl.x+pl.w,sy+20);ctx.lineTo(pl.x+pl.w+5,sy+15);ctx.stroke();}
  if(owns('gloves')){ctx.fillStyle='#bb3300';ctx.beginPath();ctx.ellipse(pl.x-4,sy+17,4,3,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(pl.x+pl.w+4,sy+17,4,3,0,0,Math.PI*2);ctx.fill();}
  if(owns('magnet')){ctx.fillStyle='#cc1111';ctx.fillRect(pl.x-3,sy+12,3,9);ctx.fillRect(pl.x+pl.w,sy+12,3,9);}
  if(owns('boost')&&!pl.onGround&&pl.vy<-5){
    ctx.fillStyle='#ff4400';ctx.beginPath();ctx.ellipse(pl.x+4,sy+pl.h+8,3,7,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.ellipse(pl.x+pl.w-4,sy+pl.h+8,3,7,0,0,Math.PI*2);ctx.fill();
  }
  if(owns('jetpack')&&pl.jetpackTime>0){
    ctx.fillStyle='rgba(0,180,255,0.7)';ctx.beginPath();ctx.ellipse(cx,sy+pl.h+10,8,4,0,0,Math.PI*2);ctx.fill();
  }
  if(owns('chalk')&&pl.onGround&&Math.abs(pl.vx)>0.5){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(cx,sy+pl.h+4,12,4,0,0,Math.PI*2);ctx.fill();}

  // Shield glow
  if(G.shieldHP>0){ctx.strokeStyle='rgba(100,200,255,0.5)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,sy+pl.h/2,20,0,Math.PI*2);ctx.stroke();}

  // Head
  ctx.fillStyle='#f5c878';ctx.beginPath();ctx.arc(cx,sy+6,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.1)';ctx.beginPath();ctx.arc(cx+2,sy+8,8,0,Math.PI*2);ctx.fill();
  const ex=cx+f*3;
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(ex,sy+4,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ex-f*5,sy+4,1.3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#a05020';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(ex-f,sy+9,3.5,0.2,Math.PI-0.2);ctx.stroke();
  ctx.fillStyle=helmetCol;ctx.beginPath();ctx.ellipse(cx,sy+1,11,6,0,Math.PI,0);ctx.fill();
  ctx.fillStyle=lighten(helmetCol,30);ctx.beginPath();ctx.ellipse(cx-2,sy-1,5,3,0,Math.PI,0);ctx.fill();
  ctx.strokeStyle=helmetCol;ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,sy+6,10,0.1,Math.PI-0.1);ctx.stroke();

  // Sword on back when not swinging
  if(owns('sword')&&!sword.swinging){
    ctx.save();ctx.translate(pl.x+pl.w-3,sy+10);ctx.rotate(0.4*f);
    ctx.strokeStyle='#8899cc';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-20);ctx.stroke();
    ctx.strokeStyle='#aa8822';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-5,-4);ctx.lineTo(5,-4);ctx.stroke();
    ctx.restore();
  }

  drawSwordSwing();
}

function drawHUD(){
  const pct=G.stamina/G.maxStamina;
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.roundRect(8,8,110,12,3);ctx.fill();
  ctx.fillStyle=pct>0.5?'#3dba50':pct>0.25?'#f09000':'#e03030';
  ctx.beginPath();ctx.roundRect(8,8,Math.round(106*pct),12,3);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 8px sans-serif';ctx.fillText('STAMINA',10,19);

  let row=25;
  if(owns('grapple')){
    const col=hook.state==='attached'?'#ff3300':hook.state==='flying'?'#ff9900':'rgba(0,0,0,0.35)';
    ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(8,row,56,10,2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='7.5px sans-serif';
    ctx.fillText(hook.state==='attached'?'HOOKED!':hook.state==='flying'?'FLYING...':'E=GRAPPLE',10,row+8);
    row+=13;
  }
  if(owns('sword')){
    const col=sword.cooldown>0?'rgba(80,80,80,0.6)':'rgba(100,150,255,0.5)';
    ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(8,row,60,10,2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='7.5px sans-serif';
    ctx.fillText(sword.cooldown>0?'SWORD (cd)':'F=SWORD',10,row+8);row+=13;
  }
  if(owns('wings')&&!pl.onGround){
    ctx.fillStyle='#7020af';ctx.beginPath();ctx.roundRect(8,row,52,10,2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='7.5px sans-serif';ctx.fillText('GLIDING!',10,row+8);row+=13;
  }
  if(G.shieldHP>0){
    ctx.fillStyle='rgba(0,180,255,0.4)';ctx.beginPath();ctx.roundRect(8,row,40,10,2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='7.5px sans-serif';ctx.fillText('SHIELD',10,row+8);row+=13;
  }
  if(owns('boost')){
    for(let i=0;i<2;i++){ctx.fillStyle=pl.jumpsLeft>i?'#ff6600':'rgba(0,0,0,0.3)';ctx.beginPath();ctx.arc(8+i*14,row+5,5,0,Math.PI*2);ctx.fill();}
    row+=16;
  }

  if(G.mountain===19&&!G.bossArena){
    ctx.fillStyle='rgba(200,30,30,0.7)';ctx.beginPath();ctx.roundRect(W/2-55,8,110,16,4);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
    ctx.fillText('⚠ APEX — DANGER ZONE',W/2,20);ctx.textAlign='left';
  }
  if(G.bossArena){
    ctx.fillStyle='rgba(120,0,160,0.7)';ctx.beginPath();ctx.roundRect(W/2-60,8,120,16,4);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
    ctx.fillText('⚔ BOSS ARENA — F=SWING',W/2,20);ctx.textAlign='left';

    // Hearts — draw at bottom center
    const hx=W/2-(G.maxHearts*18)/2, hy=H-28;
    for(let i=0;i<G.maxHearts;i++){
      const full=i<G.hearts;
      const flash=G.hitCooldown>0&&G.hitCooldown%6<3;
      ctx.fillStyle=full?(flash?'#ff8888':'#ff2020'):'rgba(80,20,20,0.6)';
      ctx.shadowColor=full?'#ff0000':'transparent';
      ctx.shadowBlur=full?6:0;
      // Draw heart shape
      const hcx=hx+i*18+7, hcy=hy+7;
      ctx.beginPath();
      ctx.moveTo(hcx,hcy+5);
      ctx.bezierCurveTo(hcx-7,hcy,hcx-7,hcy-6,hcx,hcy-3);
      ctx.bezierCurveTo(hcx+7,hcy-6,hcx+7,hcy,hcx,hcy+5);
      ctx.fill();
      ctx.shadowBlur=0;
    }
    // Label
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
    ctx.fillText('HEARTS',W/2,H-8);ctx.textAlign='left';
  }

  // Progress bar (hide in boss arena)
  if(!G.bossArena){
    const prog=Math.max(0,1-pl.y/WORLD_H),bh=H-20;
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(W-8,8,4,bh);
    ctx.fillStyle='#e8c000';ctx.fillRect(W-8,8+bh*(1-prog),4,bh*prog);
  }
}

function drawMtnName(){
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='bold 13px sans-serif';ctx.textAlign='right';
  ctx.fillText(G.bossArena?'BOSS ARENA':MTNS[G.mountain].name,W-14,H-8);ctx.textAlign='left';
}

function updateHUD(){
  const label=G.bossArena?'⚔ BOSS':(`⛰ ${G.mountain+1}/20`);
  document.getElementById('stage-label').textContent=label;
  document.getElementById('cp-num').textContent=G.cpClaimed;
  document.getElementById('cp-total').textContent=G.bossArena?'-':MTNS[G.mountain].cp+1;
  document.getElementById('coins').textContent=G.coins;
  document.getElementById('stamina').textContent=Math.round(G.stamina);
  document.getElementById('shop-coins').textContent=G.coins;
}

function showMsg(t,b,cb){document.getElementById('msg-text').textContent=t;document.getElementById('msg-btn').textContent=b;document.getElementById('msg-btn').onclick=cb;document.getElementById('msg').style.display='block';}
function hideMsg(){document.getElementById('msg').style.display='none';}

// ── Shop ──────────────────────────────────────────────────────────────────────
function openShop(){
  document.getElementById('shop-coins').textContent=G.coins;
  const el=document.getElementById('shop-items');el.innerHTML='';
  const cats=[...new Set(ITEMS.map(i=>i.cat))];
  cats.forEach(cat=>{
    const catItems=ITEMS.filter(i=>i.cat===cat&&!(i.freeOnBoss&&!G.bossArena));
    if(!catItems.length)return;
    const catDiv=document.createElement('div');catDiv.className='shop-cat';catDiv.textContent=cat;el.appendChild(catDiv);
    catItems.forEach(item=>{
      const div=document.createElement('div');div.className='shop-item';
      const canBuy=!item.owned&&G.coins>=item.price&&!item.freeOnBoss;
      const canUse=item.owned&&item.consumable&&!item.used;
      const lbl=item.owned?(item.consumable&&!item.used?'Use':'✓ Owned'):(item.freeOnBoss?'Free!':'Buy');
      const dis=(!canBuy&&!canUse)?'disabled':'';
      div.innerHTML=`<div><div style="font-size:14px;font-weight:500;">${item.emoji} ${item.name}</div><div class="item-info">${item.desc}</div></div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">${(!item.owned&&!item.freeOnBoss)?`<span style="font-size:12px;">🪙${item.price}</span>`:''}<button onclick="shopAction('${item.id}')" ${dis}>${lbl}</button></div>`;
      el.appendChild(div);
    });
  });
  document.getElementById('shop-overlay').style.display='flex';
}
function closeShop(){document.getElementById('shop-overlay').style.display='none';}
function shopAction(id){
  const item=it(id);
  if(item.owned&&item.consumable&&!item.used){
    item.used=true;
    if(id==='energy'||id==='medkit'){G.stamina=G.maxStamina;if(id==='medkit')pl.knockback=0;}
    if(id==='fireball'&&G.bossArena&&boss.active&&!boss.dead){
      const pcx=pl.x+pl.w/2,pcy=pl.y+pl.h/2;
      boss.blasts.push({x:pcx,y:pcy,vx:pl.facing*9,vy:-1,r:10,friendly:true,color:'#ff6600'});
    }
    updateHUD();openShop();return;
  }
  if(item.owned||G.coins<item.price)return;
  G.coins-=item.price;item.owned=true;
  if(id==='chalk')G.grip=Math.min(G.grip*1.25,4.0);
  if(id==='gloves')G.grip=Math.min(G.grip*1.25,4.0);
  if(id==='magnet')G.grip=Math.min(G.grip*1.4,4.0);
  if(id==='jacket'){G.maxStamina=Math.round(G.maxStamina*1.3);G.stamina=Math.min(G.stamina+30,G.maxStamina);}
  if(id==='helmet')G.helmetHP=1;
  if(id==='boost')pl.jumpsLeft=2;
  if(id==='shield')G.shieldHP=1;
  updateHUD();openShop();
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
document.getElementById('shop-btn').onclick=()=>openShop();
document.getElementById('shop-close-x').onclick=()=>closeShop();
document.getElementById('shop-close-btn').onclick=()=>closeShop();
document.getElementById('shop-overlay').onclick=e=>{if(e.target===document.getElementById('shop-overlay'))closeShop();};

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(){
  if(animId)cancelAnimationFrame(animId);
  function frame(){
    update();
    ctx.clearRect(0,0,W,H);
    drawSky();drawStars();drawMountainBg();
    drawPlatforms();drawCheckpoints();
    drawBoulders();drawEnemies();
    drawBoss();
    drawGrapple();drawPlayer();
    drawHUD();drawMtnName();
    if(!gameOver&&!won)animId=requestAnimationFrame(frame);
  }
  frame();
}

genLevel(0);loop();
</script>
