<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boss Fighter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;font-family:monospace;}
canvas{display:block;image-rendering:pixelated;}
#hud{font-size:11px;color:#eee;background:#111;padding:3px 8px;display:flex;gap:8px;align-items:center;width:320px;}
#hint{font-size:10px;color:#555;background:#0a0a0a;padding:2px 8px;width:320px;}
</style>
</head>
<body>
<div style="position:relative;width:320px">
<canvas id="g" width="320" height="540"></canvas>
<div id="clearOv" style="display:none;position:absolute;top:0;left:0;width:320px;height:540px;background:rgba(0,0,0,0.85);flex-direction:column;align-items:center;justify-content:center;gap:14px">
  <div id="clearTitle" style="font-size:22px;font-weight:bold;color:#ffdd44;font-family:monospace;letter-spacing:2px;text-align:center"></div>
  <div id="clearSub" style="font-size:12px;color:#aaa;font-family:monospace;text-align:center;padding:0 20px"></div>
  <div id="clearBtns" style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;justify-content:center">
    <button id="clearRedo" style="padding:8px 14px;background:#223;color:#eee;border:2px solid #446;font-family:monospace;font-size:12px;cursor:pointer;border-radius:6px">Redo Level</button>
    <button id="clearRestart" style="display:none;padding:8px 14px;background:#332200;color:#ffaa44;border:2px solid #664400;font-family:monospace;font-size:12px;cursor:pointer;border-radius:6px">Restart Game</button>
    <button id="clearNext" style="padding:8px 14px;background:#ffdd44;color:#111;border:none;font-family:monospace;font-size:13px;font-weight:bold;cursor:pointer;border-radius:6px"></button>
  </div>
</div>
<div id="mercuryOv" style="display:none;position:absolute;top:0;left:0;width:320px;height:540px;background:rgba(0,0,10,0.96);flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:30px;box-sizing:border-box">
  <div style="font-size:13px;color:#ffdd88;font-family:monospace;font-weight:bold;letter-spacing:3px;margin-bottom:-8px">INCOMING TRANSMISSION</div>
  <div style="width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#cc9966,#885533,#442211);border:2px solid #aa7744;box-shadow:0 0 18px rgba(180,120,60,0.5)"></div>
  <div style="font-size:12px;color:#aaddff;font-family:monospace;text-align:center;line-height:2;letter-spacing:0.5px;white-space:pre-line" id="mercuryText"></div>
  <button id="mercuryBtn" style="padding:10px 28px;background:#ffdd44;color:#111;border:none;font-family:monospace;font-size:13px;font-weight:bold;cursor:pointer;border-radius:6px;margin-top:4px">Let's go!</button>
</div>
<div id="titleOv" style="display:flex;position:absolute;top:0;left:0;width:320px;height:540px;background:rgba(0,0,0,0);flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none"></div>
</div>
<div id="hud">
  <span id="hlv" style="color:#ffdd44;font-weight:bold">Level 1</span>
  <span id="hhp" style="color:#ff6666"></span>
  <span id="hbhp" style="color:#ff4444"></span>
  <span id="hmsg" style="color:#aaa;font-size:10px;margin-left:auto"></span>
</div>
<div id="hint">Click or press ENTER to start</div>
<script>
var cv=document.getElementById('g');
var ct=cv.getContext('2d');
var W=320,H=540,GRAV=0.55,JET_MAX=3600;
var T=Date.now; // time helper

var HINTS=[
  'Arrows/WASD move | SPACE/UP=jump | Stomp boss head to damage',
  'Arrows/WASD move | SPACE/UP=jump | Stomp boss head to damage',
  'Arrows/WASD move | SPACE/UP=jetpack | Fly UNDER boss to hit it',
  'Arrows/WASD move | SPACE/UP=jump | Z=sword slash',
  'Arrows/WASD move | SPACE/UP=high jump | Z=magic blast',
  'Mercury \u2013 Stomp the Glob Alien on its head!',
  'Mercury \u2013 Stomp the Swarm Queen on its head! Dodge the arms!',
  'Mercury \u2013 Grab the jetpack. Collect 8 missiles. Aim with mouse, press Z to launch at the boss!',
];
var LVNAMES=['Level 1 \u2013 Sewer','Level 2 \u2013 House','Level 3 \u2013 Sky','Level 4 \u2013 Heaven','Level 5 \u2013 Space',
  'Mercury \u2013 Glob Alien','Mercury \u2013 Swarm Queen','Mercury \u2013 The Destroyer'];

function getPlats(li){
  var g=[[0,820,320,60]];
  if(li===0) g.push([0,760,90,14],[110,700,80,14],[210,640,90,14],[90,575,80,14],[20,510,80,14],[170,445,80,14],[40,375,240,14]);
  else if(li===1) g.push([0,760,80,14],[110,700,80,14],[210,640,80,14],[80,570,80,14],[10,505,80,14],[180,440,80,14],[40,370,240,14]);
  else if(li===2) g.push([0,760,80,14],[120,700,70,14],[220,640,70,14],[80,575,70,14],[180,510,80,14],[50,445,100,14],[0,180,320,14]);
  else if(li===3) g.push([0,760,80,14],[120,690,80,14],[220,625,80,14],[90,555,80,14],[210,490,80,14],[60,420,80,14],[40,355,240,14]);
  else if(li===4) g.push([0,760,70,14],[120,690,70,14],[220,620,70,14],[90,550,70,14],[220,480,70,14],[60,410,70,14],[40,345,240,14]);
  // Mercury levels — rocky orange terrain
  else if(li===5) g.push([0,760,80,14],[120,700,70,14],[200,640,80,14],[80,575,70,14],[180,510,80,14],[40,375,240,14]);
  else if(li===6) g.push([0,760,70,14],[110,695,70,14],[210,630,80,14],[90,565,70,14],[200,500,80,14],[40,370,240,14]);
  else if(li===7){
    // Parkour up, jetpack near the end, then wide boss arena floor
    g.push(
      [0,760,80,14],[220,710,70,14],
      [90,655,70,14],[210,600,70,14],
      [60,545,80,14],
      // Jetpack pickup platform — near end of parkour
      [170,490,90,14],
      // Boss arena floor
      [0,370,320,14]
    );
  }
  return g;
}

function getJetPickup(li){ return (li===2||li===7)?{x:li===2?90:200,y:li===2?423:468,w:24,h:22,collected:false}:null; }

function makeBoss(li,plats){
  var bf=plats[plats.length-1];
  var BD=[
    {name:'Slime King',   w:56,h:52,hp:6, x:200,vx:1.2},
    {name:'House Troll',  w:50,h:54,hp:9, x:200,vx:1.6},
    {name:'Sky Tyrant',   w:52,h:48,hp:12,x:130,vx:2.4},
    {name:'Gate Guardian',w:54,h:58,hp:15,x:200,vx:2.0},
    {name:'Void Emperor', w:58,h:58,hp:20,x:200,vx:0},
    {name:'Glob Alien',   w:54,h:50,hp:8, x:200,vx:1.4},
    {name:'Swarm Queen',  w:58,h:54,hp:10,x:200,vx:1.6},
    {name:'The Destroyer',w:80,h:80,hp:0, x:120,vx:3.0},// hp=0, killed by missiles; very fast
  ];
  var bd=BD[li]||BD[4];
  var by=(li===2)?bf[1]-bd.h-100:bf[1]-bd.h;
  // Destroyer floats above arena floor
  if(li===7) by=bf[1]-bd.h-10;
  return{name:bd.name,w:bd.w,h:bd.h,hp:bd.hp,maxHp:Math.max(bd.hp,1),
    x:bd.x,y:by,bfy:bf[1],vx:bd.vx,alive:true,
    timer:0,sTimer:0,stunT:0,phase:0,projs:[],minions:[],
    // Destroyer special
    missilesNeeded:li===7?8:0,missilesHit:0,
    // Swarm Queen special
    spikeRageTimer:0,headSpikeTimer:0,
    armPhase:0};}


var G=null,K={},soulsteel=false,ROCKET=null,MOUSE={x:160,y:270};
document.addEventListener('keydown',function(e){
  K[e.code]=true;
  if(e.code==='Space'||e.code==='ArrowUp')e.preventDefault();
  if(e.code==='KeyR'&&G&&G.state==='play')startLevel(G.li);
  if(e.code==='Enter'&&!G){soulsteel=false;startLevel(0);}
});
document.addEventListener('keyup',function(e){K[e.code]=false;});
// Track mouse relative to canvas
cv.addEventListener('mousemove',function(e){
  var rect=cv.getBoundingClientRect();
  var scaleX=cv.width/rect.width;
  var scaleY=cv.height/rect.height;
  MOUSE.x=(e.clientX-rect.left)*scaleX;
  MOUSE.y=(e.clientY-rect.top)*scaleY;
});

function getMissiles(li){
  if(li!==7)return [];
  return [
    {x:20,  y:350, w:16,h:20,collected:false},
    {x:80,  y:350, w:16,h:20,collected:false},
    {x:140, y:350, w:16,h:20,collected:false},
    {x:200, y:350, w:16,h:20,collected:false},
    {x:260, y:350, w:16,h:20,collected:false},
    {x:50,  y:350, w:16,h:20,collected:false},
    {x:170, y:350, w:16,h:20,collected:false},
    {x:290, y:350, w:16,h:20,collected:false},
  ];
}

function startRocketAnimation(){
  ROCKET={phase:'launch',timer:0,rocketY:H+60,rocketX:W/2-11,flame:0,stars:[]};
  for(var i=0;i<80;i++) ROCKET.stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()<0.15?2:1,sp:0.5+Math.random()*2});
  G=null;
}

function updateRocket(){
  if(!ROCKET)return;
  ROCKET.timer++;ROCKET.flame=(ROCKET.flame+1)%8;
  var t=ROCKET.timer;
  if(ROCKET.phase==='launch'){
    ROCKET.rocketY-=2+t*0.04;
    for(var i=0;i<ROCKET.stars.length;i++) ROCKET.stars[i].y+=ROCKET.stars[i].sp;
    if(ROCKET.rocketY<-200) ROCKET.phase='travel';
  } else if(ROCKET.phase==='travel'){
    for(var i=0;i<ROCKET.stars.length;i++){ROCKET.stars[i].y+=ROCKET.stars[i].sp*4;if(ROCKET.stars[i].y>H)ROCKET.stars[i].y=-4;}
    if(t>180){ROCKET.phase='arrive';ROCKET.timer=0;ROCKET.rocketY=H+80;}
  } else if(ROCKET.phase==='arrive'){
    ROCKET.rocketY-=3;
    for(var i=0;i<ROCKET.stars.length;i++){ROCKET.stars[i].y+=ROCKET.stars[i].sp*0.3;if(ROCKET.stars[i].y>H)ROCKET.stars[i].y=0;}
    if(ROCKET.rocketY<H*0.35){ROCKET.phase='land';ROCKET.timer=0;}
  } else if(ROCKET.phase==='land'){
    ROCKET.rocketY+=1.5;
    if(ROCKET.rocketY>H+60){ROCKET=null;startLevel(5);}
  }
}

function drawRocket(){
  if(!ROCKET)return;
  ct.fillStyle='#000010';ct.fillRect(0,0,W,H);
  for(var i=0;i<ROCKET.stars.length;i++){
    var s=ROCKET.stars[i];
    ct.fillStyle='rgba(255,255,255,'+(0.3+s.s*0.3)+')';
    ct.fillRect(Math.round(s.x),Math.round(s.y%H),s.s,s.s);
  }
  if(ROCKET.phase==='arrive'||ROCKET.phase==='land'){
    var mr=60+ROCKET.timer*0.5;
    ct.fillStyle='#cc7733';ct.beginPath();ct.arc(W/2,H-mr*0.4,mr,0,Math.PI*2);ct.fill();
    ct.fillStyle='#bb6622';ct.beginPath();ct.arc(W/2-10,H-mr*0.4-10,mr*0.4,0,Math.PI*2);ct.fill();
    ct.fillStyle='rgba(100,40,10,0.5)';
    for(var i=0;i<5;i++){ct.beginPath();ct.arc(W/2-30+i*20,H-mr*0.4+20,6+i*2,0,Math.PI*2);ct.fill();}
  }
  if(ROCKET.phase==='launch'){
    ct.fillStyle='#2244aa';ct.beginPath();ct.arc(W/2,H+40-ROCKET.timer*0.3,50+ROCKET.timer*0.2,0,Math.PI*2);ct.fill();
    ct.fillStyle='#33aa44';ct.beginPath();ct.arc(W/2-10,H+30-ROCKET.timer*0.3,20,0,Math.PI*2);ct.fill();
  }
  var rx=Math.round(ROCKET.rocketX),ry=Math.round(ROCKET.rocketY);
  ct.fillStyle=ROCKET.flame%2===0?'#ff8800':'#ffdd00';
  ct.beginPath();ct.moveTo(rx+4,ry+50);ct.lineTo(rx+18,ry+50);ct.lineTo(rx+11,ry+68+Math.random()*8);ct.fill();
  ct.fillStyle='rgba(255,100,0,0.3)';ct.beginPath();ct.ellipse(rx+11,ry+54,10,16,0,0,Math.PI*2);ct.fill();
  ct.fillStyle='#cccccc';ct.beginPath();ct.moveTo(rx+11,ry);ct.lineTo(rx+22,ry+40);ct.lineTo(rx,ry+40);ct.fill();
  ct.fillStyle='#eeeeee';ct.fillRect(rx,ry+36,22,14);
  ct.fillStyle='#cc3322';
  ct.beginPath();ct.moveTo(rx,ry+42);ct.lineTo(rx-10,ry+52);ct.lineTo(rx,ry+52);ct.fill();
  ct.beginPath();ct.moveTo(rx+22,ry+42);ct.lineTo(rx+32,ry+52);ct.lineTo(rx+22,ry+52);ct.fill();
  ct.fillStyle='#aaddff';ct.beginPath();ct.arc(rx+11,ry+22,7,0,Math.PI*2);ct.fill();
  ct.fillStyle='rgba(200,240,255,0.6)';ct.beginPath();ct.arc(rx+9,ry+20,3,0,Math.PI*2);ct.fill();
  ct.fillStyle='#ffccaa';ct.beginPath();ct.arc(rx+11,ry+22,4,0,Math.PI*2);ct.fill();
  ct.fillStyle='rgba(255,255,255,0.5)';ct.font='9px monospace';ct.textAlign='center';
  var label=ROCKET.phase==='launch'?'Launching to Mercury...':ROCKET.phase==='travel'?'Traveling through space...':'Arriving at Mercury...';
  ct.fillText(label,W/2,30);ct.textAlign='left';
}

function startLevel(li){
  var plats=getPlats(li);
  var boss=makeBoss(li,plats);
  var sp=plats[0];
  var py=sp[1]-32;
  G={li:li,plats:plats,boss:boss,
    jetpickup:getJetPickup(li),
    missiles:getMissiles(li),
    player:{x:20,y:py,vx:0,vy:0,w:16,h:28,grnd:false,
      hp:5,maxHp:5,iframes:0,face:1,walkFrame:0,walkTimer:0,
      hasJetpack:false,jetFuel:JET_MAX,jetMax:JET_MAX,
      swordCD:0,swordSwing:0,magicCD:0,bullets:[],dead:false,
      missilesCarried:0},
    cam:py-H*0.5,respawn:{x:20,y:py},
    bossArea:false,parts:[],state:'play',dtimer:0,tick:0};
  document.getElementById('hint').textContent=(HINTS[li]||HINTS[4])+(soulsteel?' | SOUL STEEL: one life!':'');
  document.getElementById('clearOv').style.display='none';
  document.getElementById('titleOv').style.display='none';
}

function resolveY(p,plats){
  p.grnd=false;
  for(var i=0;i<plats.length;i++){
    var pl=plats[i];
    if(p.x+p.w<pl[0]||p.x>pl[0]+pl[2])continue;
    if(p.vy>=0&&p.y+p.h>pl[1]&&p.y+p.h<pl[1]+pl[3]+20&&p.y<pl[1]){
      p.y=pl[1]-p.h;p.vy=0;p.grnd=true;
    }
  }
}

function addPart(x,y,col,n,sp,grav){
  for(var i=0;i<(n||6);i++)
    G.parts.push({x:x,y:y,vx:(Math.random()-.5)*(sp||4),vy:-Math.random()*(sp||3)-1,life:1,col:col,grav:grav||false});
}

function showClear(li,nm){
  setTimeout(function(){
    var ov=document.getElementById('clearOv');
    var isSpace=li===4;
    var isMercuryEnd=li===7;
    var title=isMercuryEnd?'MERCURY SAVED!':isSpace?'YOU WIN!':'Level Clear!';
    var sub=isMercuryEnd?'The Destroyer is defeated! Mercury is free!':isSpace?'The Void Emperor is vanquished!':nm+' defeated!';
    document.getElementById('clearTitle').textContent=title;
    document.getElementById('clearSub').textContent=sub;
    var nb=document.getElementById('clearNext');
    var rb=document.getElementById('clearRestart');
    nb.textContent=(isSpace||isMercuryEnd)?'Next \u2192':'Next Level';
    rb.style.display=(isSpace||isMercuryEnd)?'inline-block':'none';
    document.getElementById('clearRedo').onclick=function(){ov.style.display='none';startLevel(li);};
    rb.onclick=function(){ov.style.display='none';soulsteel=false;startLevel(0);};
    nb.onclick=function(){
      if(isMercuryEnd){ov.style.display='none';startLevel(0);return;}
      if(isSpace){
        ov.style.display='none';
        // Show Mercury story screen
        var mov=document.getElementById('mercuryOv');
        var txt=document.getElementById('mercuryText');
        txt.innerHTML='';
        mov.style.display='flex';
        // Typewriter effect
        var msg='The planet Mercury is in trouble.\n\nIt is being attacked by aliens,\nand only you can stop them.\n\nGo save Mercury, now.\n\nWe believe in you. Go!';
        var chars=msg.split('');
        var idx=0;
        var interval=setInterval(function(){
          if(idx<chars.length){
            txt.textContent+=chars[idx]==='​'?' ':chars[idx];
            idx++;
          } else {
            clearInterval(interval);
          }
        },40);
        document.getElementById('mercuryBtn').onclick=function(){
          mov.style.display='none';
          startRocketAnimation();
        };
      } else {
        ov.style.display='none';startLevel(li+1);
      }
    };
    ov.style.display='flex';
  },700);
}

function damageBoss(n){
  var b=G.boss;if(!b.alive||b.stunT>0)return;
  b.hp=Math.max(0,b.hp-n);b.stunT=20;
  addPart(b.x+b.w/2,b.y+b.h/2,'#ffffff',12,6);
  addPart(b.x+b.w/2,b.y+b.h/2,'#ffdd44',8,4);
  // Swarm Queen: burst spikes from head for 2 seconds (120 frames) when hit
  if(G.li===6){
    b.spikeRageTimer=120;
  }
  if(b.hp<=0){b.alive=false;for(var i=0;i<5;i++)setTimeout(function(){addPart(b.x+Math.random()*b.w,b.y+Math.random()*b.h,'#ffdd44',10,6,true);},i*120);G.state='clear';showClear(G.li,b.name);}
}

function hurtPlayer(n){
  var p=G.player;if(p.iframes>0)return;
  p.hp=Math.max(0,p.hp-n);p.iframes=55;
  addPart(p.x+8,p.y+14,'#ff4433',10,4);
  if(p.hp<=0&&!p.dead){
    p.dead=true;
    if(soulsteel){
      // Soul Steel: death = restart entire game from level 1
      G.state='dead';G.dtimer=90;
      setTimeout(function(){soulsteel=true;startLevel(0);},1200);
    } else {
      G.state='dead';G.dtimer=90;
    }
  }
}

function updateBoss(){
  var b=G.boss,li=G.li,p=G.player;
  b.timer++;b.sTimer++;
  if(b.stunT>0){b.stunT--;return;}
  b.phase=Math.min(2,Math.floor((1-b.hp/b.maxHp)*3));
  // Always tick down headSpikeTimer every frame regardless of shot rate
  if(b.headSpikeTimer>0)b.headSpikeTimer--;
  // Difficulty multiplier: each level fires faster and hits harder
  var diff=1+li*0.35; // 1.0 → 1.35 → 1.70 → 2.05 → 2.40
  // Movement
  if(li===2){b.x+=b.vx;b.y=b.bfy-b.h-110+Math.sin(b.timer*0.035)*55;if(b.x<10||b.x+b.w>W-10)b.vx*=-1;}
  else if(li===4){if(b.timer%Math.round(140/diff)===0){b.x=20+Math.random()*(W-80);addPart(b.x+b.w/2,b.y+b.h/2,'#8844ff',16,5);}}
  else{b.x+=b.vx;if(b.x<10||b.x+b.w>W-10)b.vx*=-1;}
  var rate=Math.max(28,Math.round((115-b.phase*22)/diff));
  if(b.sTimer<rate)return;
  b.sTimer=0;
  var dx=p.x+8-(b.x+b.w/2),dy=p.y+14-(b.y+b.h/2),d=Math.sqrt(dx*dx+dy*dy)||1;
  var spd=diff; // base speed multiplier for projectiles
  if(li===0){
    var minionCount=1+b.phase;
    if(b.timer%50<25){
      b.projs.push({x:b.x+b.w/2,y:b.y+b.h*0.7,vx:dx/d*(3.8*diff),vy:dy/d*(3.8*diff),r:9,col:'#55dd22',type:'slime'});
      // Phase 1+: fire spread shots too
      if(b.phase>=1){var a=Math.atan2(dy,dx);for(var s=-1;s<=1;s+=2)b.projs.push({x:b.x+b.w/2,y:b.y+b.h*0.7,vx:Math.cos(a+s*0.35)*(3.2*diff),vy:Math.sin(a+s*0.35)*(3.2*diff),r:7,col:'#44cc11',type:'slime'});}
    } else {
      for(var mn=0;mn<minionCount;mn++)b.minions.push({x:b.x+b.w/2+mn*12,y:b.bfy-16,w:18,h:14,vx:(p.x>b.x?1:-1)*(2.4+li*0.5),col:'#886622',eyeCol:'#ffff44'});
    }
  } else if(li===1){
    var nchairs=1+b.phase;
    for(var c=0;c<nchairs;c++)b.projs.push({x:b.x+b.w/2+(c-1)*20,y:b.y+10,vx:(Math.random()-.5)*(7*diff),vy:-9*diff,r:12,col:'#885533',type:'chair',grav:true,rot:0,rotV:(Math.random()-.5)*0.3*diff});
  } else if(li===2){
    b.projs.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:dx/d*(4.2*diff),vy:dy/d*(4.2*diff),r:9,col:'#88ddff',type:'wind'});
    if(b.phase>=1){var a2=Math.atan2(dy,dx);b.projs.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:Math.cos(a2+0.4)*(3.5*diff),vy:Math.sin(a2+0.4)*(3.5*diff),r:7,col:'#aaddff',type:'wind'});}
    var bombRate=Math.round(75/diff);
    if(b.timer%bombRate===0)b.projs.push({x:p.x+(Math.random()*70-35),y:b.y+b.h+10,vx:(Math.random()-.5)*2,vy:1.5,r:12,col:'#ff8800',type:'bomb',grav:true});
  } else if(li===3){
    var nspikes=3+b.phase+(li-3); // more spikes each level
    for(var i=0;i<nspikes;i++)b.projs.push({x:30+Math.random()*260,y:b.y-5,vx:(Math.random()-.5)*0.5,vy:(3.5+Math.random()*2)*diff,r:8,col:'#ffffcc',type:'spike'});
  } else if(li===4){
    var nmagic=1+b.phase;
    for(var m=0;m<nmagic;m++)b.projs.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:(Math.random()-.5)*(9*diff),vy:(Math.random()-.5)*(9*diff),r:10,col:'#cc44ff',type:'magic'});
    var asteroidRate=Math.round(65/diff);
    if(b.timer%asteroidRate===0)b.projs.push({x:Math.random()*W,y:-40,vx:(Math.random()-.5)*2,vy:4.5*diff,r:15,col:'#aaaacc',type:'asteroid',grav:true,rot:0,rotV:(Math.random()-.5)*0.15});
  } else if(li===5){
    // Glob Alien: shoots goo, always spawns miniature bosses (never rats)
    var dx5=p.x+8-(b.x+b.w/2),dy5=p.y+14-(b.y+b.h/2),d5=Math.sqrt(dx5*dx5+dy5*dy5)||1;
    var na=Math.atan2(dy5,dx5);
    var ngoo=1+b.phase;
    for(var i=0;i<ngoo;i++){
      var spread=(i-(ngoo-1)/2)*0.3;
      b.projs.push({x:b.x+b.w/2,y:b.y+b.h*0.6,vx:Math.cos(na+spread)*3.5,vy:Math.sin(na+spread)*3.5,r:10,col:'#44ee22',type:'goo'});
    }
    // Spawn mini-bosses only if fewer than 2 are alive
    var activeMinis=0;
    for(var mn=0;mn<b.minions.length;mn++){
      if(b.minions[mn].type==='miniboss_slime'||b.minions[mn].type==='miniboss_troll')activeMinis++;
    }
    if(activeMinis<2){
      var mtype=b.timer%120<60?'miniboss_slime':'miniboss_troll';
      b.minions.push({x:b.x+b.w/2,y:b.bfy-20,w:22,h:20,
        vx:(p.x>b.x?1:-1)*(2.2+b.phase*0.5),
        col:mtype==='miniboss_slime'?'#228811':'#664422',
        eyeCol:mtype==='miniboss_slime'?'#aaffaa':'#ffff44',
        type:mtype,hp:1});
    }
  } else if(li===6){
    // Swarm Queen: sweeps arms
    b.projs.push({x:b.x+(Math.random()>0.5?b.w+5:-35),y:b.y+b.h*0.5+Math.random()*20,vx:p.x>b.x?3.5:-3.5,vy:(Math.random()-.5)*1.5,r:14,col:'#ff88cc',type:'arm'});
    if(b.phase>=1)b.projs.push({x:b.x+b.w/2,y:b.y+b.h,vx:(Math.random()-.5)*4,vy:2+Math.random()*2,r:10,col:'#ff44aa',type:'arm'});
    // Spike burst from head when rage active
    if(b.spikeRageTimer>0){
      b.spikeRageTimer--;
      if(b.spikeRageTimer%8===0){
        for(var sr=0;sr<5;sr++){
          var sa=sr*(Math.PI*2/5);
          b.projs.push({x:b.x+b.w/2,y:b.y+6,vx:Math.cos(sa)*4.5,vy:Math.sin(sa)*4.5,r:6,col:'#ff2266',type:'spike'});
        }
        addPart(b.x+b.w/2,b.y,'#ff44aa',6,4);
      }
    }
  } else if(li===7){
    // Destroyer handled by updateDestroyerLogic — skip here
  }
}

// Handle Destroyer separately — it moves in updateBoss above but also needs this guard
function updateDestroyerLogic(){
  var b=G.boss;
  if(!b.alive||G.li!==7)return;
  b.timer++;
  // Speed ramps up dramatically with each missile hit
  var spd=3.0+b.missilesHit*0.8;
  // Random direction change every 30-60 frames for unpredictability
  if(b.timer%Math.max(20,50-b.missilesHit*5)===0&&Math.random()<0.6)b.vx*=-1;
  b.x+=b.vx>0?spd:-spd;
  if(b.x<10||b.x+b.w>W-10)b.vx*=-1;
  // Vertical: aggressive stomp pattern that intensifies with hits
  var bf=b.bfy;
  var stompSpeed=0.07+b.missilesHit*0.015;
  var stompAmp=30+b.missilesHit*4;
  b.y=bf-b.h-5+Math.sin(b.timer*stompSpeed)*stompAmp;
  // Heavy impact debris when near ground
  var sinVal=Math.sin(b.timer*stompSpeed);
  if(sinVal<-0.6){
    if(b.timer%3===0){
      addPart(b.x+b.w/2,bf,'#cc8833',6,7,false);
      addPart(b.x+Math.random()*b.w,bf,'#aa6622',3,4,false);
    }
  }
  // Massive stomp every few seconds, faster as missiles hit
  var stompRate=Math.max(25,60-b.missilesHit*8);
  if(b.timer%stompRate===0){
    addPart(b.x+b.w/2,bf,'#dd9944',30,10,true);
    addPart(b.x,bf,'#cc7722',12,6,false);
    addPart(b.x+b.w,bf,'#cc7722',12,6,false);
    // Shockwave rings
    for(var i=0;i<3;i++) addPart(b.x+b.w/2,bf,'#ffaa44',4,3+i*2,false);
  }
}

function update(){
  if(ROCKET){updateRocket();return;}
  if(!G)return;
  G.tick++;
  for(var i=G.parts.length-1;i>=0;i--){var pt=G.parts[i];pt.x+=pt.vx;pt.y+=pt.vy;if(pt.grav)pt.vy+=0.15;else pt.vy+=0.1;pt.vx*=0.96;pt.life-=0.028;if(pt.life<=0)G.parts.splice(i,1);}
  if(G.state==='dead'){G.dtimer--;if(G.dtimer<=0&&!soulsteel){var p=G.player;p.x=G.respawn.x;p.y=G.respawn.y;p.vx=0;p.vy=0;p.hp=p.maxHp;p.dead=false;p.iframes=30;G.state='play';}return;}
  if(G.state!=='play')return;
  var p=G.player,li=G.li,b=G.boss;
  var lft=K['ArrowLeft']||K['KeyA'],rgt=K['ArrowRight']||K['KeyD'],spc=K['Space']||K['ArrowUp']||K['KeyW'],atk=K['KeyZ'];
  // Horizontal
  if(lft){p.vx=-3.2;p.face=-1;}else if(rgt){p.vx=3.2;p.face=1;}else p.vx*=0.70;
  // Walk animation
  if(p.grnd&&(lft||rgt)){p.walkTimer++;if(p.walkTimer>8){p.walkTimer=0;p.walkFrame=(p.walkFrame+1)%4;}}
  else if(!p.grnd){p.walkFrame=2;}
  else p.walkFrame=0;
  // Vertical
  var jetLv=(li===2||li===7);
  if(jetLv&&p.hasJetpack){
    if(spc&&p.jetFuel>0){p.vy=Math.max(p.vy-0.85,-7.5);p.jetFuel=Math.max(0,p.jetFuel-1);if(G.tick%3===0)addPart(p.x+8,p.y+p.h,'#ff8800',2,3);}
    else p.jetFuel=Math.min(p.jetMax,p.jetFuel+0.5);
    p.vy+=GRAV*0.42;
  } else {
    var jf=li===4?-16:-12;
    if(spc&&p.grnd&&!K._j){p.vy=jf;K._j=true;addPart(p.x+8,p.y+p.h,'#ffffff',5,3);}
    if(!spc)K._j=false;
    p.vy+=GRAV;
  }
  p.vy=Math.min(p.vy,18);
  p.x+=p.vx;p.x=Math.max(0,Math.min(p.x,W-p.w));
  p.y+=p.vy;
  resolveY(p,G.plats);
  if(p.y>900){p.x=G.respawn.x;p.y=G.respawn.y;p.vy=0;}
  G.cam+=(p.y-H*0.5-G.cam)*0.1;
  // Jetpack pickup
  if((li===2||li===7)&&G.jetpickup&&!G.jetpickup.collected){
    var jp=G.jetpickup;
    if(p.x+p.w>jp.x&&p.x<jp.x+jp.w&&p.y+p.h>jp.y&&p.y<jp.y+jp.h){
      jp.collected=true;p.hasJetpack=true;p.jetFuel=JET_MAX;
      addPart(jp.x+12,jp.y+11,'#ff8800',20,6);addPart(jp.x+12,jp.y+11,'#ffdd44',12,4);
      document.getElementById('hint').textContent=li===7?'Jetpack! Fly around and collect 5 glowing missiles. Press Z near boss to launch!':'Jetpack! Hold SPACE to fly. Fly UNDER Sky Tyrant to hit it!';
    }
  }
  // Boss area check
  var bf=G.plats[G.plats.length-1];
  if(!G.bossArea){
    if(li===2){if(p.y<440){G.bossArea=true;G.respawn={x:30,y:435};}}
    else if(li===7){if(p.grnd&&Math.abs(p.y+p.h-bf[1])<5){G.bossArea=true;G.respawn={x:30,y:bf[1]-42};}}
    else{if(p.grnd&&Math.abs(p.y+p.h-bf[1])<5){G.bossArea=true;G.respawn={x:30,y:bf[1]-42};}}
  }

  // Missile pickups (level 7)
  if(li===7&&G.missiles){
    for(var i=0;i<G.missiles.length;i++){
      var ms=G.missiles[i];
      // Count down respawn timer
      if(ms.collected&&ms.respawnTimer>0){
        ms.respawnTimer--;
        if(ms.respawnTimer<=0){ms.collected=false;addPart(ms.x+8,ms.y+10,'#ffdd44',8,4);}
      }
      if(!ms.collected&&p.x+p.w>ms.x&&p.x<ms.x+ms.w&&p.y+p.h>ms.y&&p.y<ms.y+ms.h){
        ms.collected=true;ms.respawnTimer=300; // respawn after ~5 seconds
        p.missilesCarried++;
        addPart(ms.x+8,ms.y+10,'#ffdd44',14,5);addPart(ms.x+8,ms.y+10,'#ff8800',8,4);
        var left=8-p.missilesCarried;
        document.getElementById('hint').textContent=left>0?('Missile collected! '+left+' more to find. Aim with mouse, Z=launch!'):'All 8 missiles! Aim with mouse and press Z to launch!';
      }
    }
    // Launch missiles aimed at mouse cursor with Z
    if(atk&&p.missilesCarried>0&&b.alive){
      // Mouse is in screen coords; convert to world coords using cam
      var worldMouseX=MOUSE.x;
      var worldMouseY=MOUSE.y+Math.round(G.cam);
      var mdx=worldMouseX-(p.x+8),mdy=worldMouseY-(p.y+14);
      var mdd=Math.sqrt(mdx*mdx+mdy*mdy)||1;
      // Fire all carried missiles toward mouse
      for(var m=0;m<p.missilesCarried;m++){
        (function(delay,spreadAngle){
          setTimeout(function(){
            if(!b.alive)return;
            b.projs.push({x:p.x+8,y:p.y+14,
              vx:Math.cos(spreadAngle)*7,vy:Math.sin(spreadAngle)*7,
              r:6,col:'#ff4400',type:'missile',fromPlayer:true});
          },delay*100);
        })(m, Math.atan2(mdy,mdx)+(m-(p.missilesCarried-1)/2)*0.18);
      }
      p.missilesCarried=0;
    }
    // Player missiles hitting boss
    for(var i=b.projs.length-1;i>=0;i--){
      var pr2=b.projs[i];
      if(pr2.fromPlayer){
        if(b.alive&&pr2.x+pr2.r>b.x&&pr2.x-pr2.r<b.x+b.w&&pr2.y+pr2.r>b.y&&pr2.y-pr2.r<b.y+b.h){
          b.missilesHit++;addPart(b.x+b.w/2,b.y+b.h/2,'#ff8800',16,7);addPart(pr2.x,pr2.y,'#ffdd44',10,5);b.projs.splice(i,1);
          if(b.missilesHit>=8){damageBoss(999);}
          continue;
        }
      }
    }
    // Destroyer moves and crumbles platforms (visual only via particles)
    if(G.bossArea&&b.alive){updateDestroyerLogic();}
  }

  // Attacks
  if(p.swordCD>0)p.swordCD--;if(p.magicCD>0)p.magicCD--;if(p.swordSwing>0)p.swordSwing--;
  if(li===3&&atk&&p.swordCD===0){
    p.swordSwing=18;p.swordCD=30;
    var sx=p.face>0?p.x+p.w:p.x-32,sy=p.y+6;
    if(b.alive&&sx<b.x+b.w&&sx+32>b.x&&sy<b.y+b.h&&sy+20>b.y){damageBoss(2);addPart(b.x+b.w/2,b.y+b.h/2,'#ffee88',12,5);}
    addPart(p.x+8+(p.face>0?20:-20),p.y+10,'#ccddff',6,3);
  }
  if(li===4&&atk&&p.magicCD===0){
    p.magicCD=24;
    p.bullets.push({x:p.x+(p.face>0?p.w+2:-10),y:p.y+p.h/2,vx:p.face*8,vy:0,r:8,life:1.8,col:'#cc44ff',trail:[]});
    addPart(p.x+8,p.y+p.h/2,'#cc44ff',8,4);
  }
  for(var i=p.bullets.length-1;i>=0;i--){
    var bl=p.bullets[i];
    if(bl.trail)bl.trail.push({x:bl.x,y:bl.y,life:0.5});
    bl.x+=bl.vx;bl.y+=bl.vy;bl.life-=0.022;
    if(bl.trail)for(var j=bl.trail.length-1;j>=0;j--){bl.trail[j].life-=0.05;if(bl.trail[j].life<=0)bl.trail.splice(j,1);}
    if(b.alive&&bl.x+bl.r>b.x&&bl.x-bl.r<b.x+b.w&&bl.y+bl.r>b.y&&bl.y-bl.r<b.y+b.h){damageBoss(2);addPart(bl.x,bl.y,'#dd88ff',12,5);bl.life=0;}
    if(bl.life<=0||bl.x<-20||bl.x>W+20)p.bullets.splice(i,1);
  }
  if(p.iframes>0)p.iframes--;
  if(G.bossArea&&b.alive&&li!==7)updateBoss();
  // Collisions
  if(p.iframes===0){
    for(var i=0;i<b.projs.length;i++){var pr=b.projs[i];if(pr.fromPlayer)continue;if(Math.abs(pr.x-p.x-8)<p.w/2+pr.r-2&&Math.abs(pr.y-p.y-14)<p.h/2+pr.r-2){hurtPlayer(1);break;}}
    for(var i=0;i<b.minions.length;i++){
      var m=b.minions[i];
      if(m.x<p.x+p.w&&m.x+m.w>p.x&&m.y<p.y+p.h&&m.y+m.h>p.y){
        // Mini-bosses can be stomped
        if((m.type==='miniboss_slime'||m.type==='miniboss_troll')&&p.vy>1&&p.y+p.h<m.y+10){
          p.vy=-9;
          if(m.hp!==undefined){m.hp--;if(m.hp<=0){addPart(m.x+m.w/2,m.y,'#44ff44',10,5);b.minions.splice(i,1);i--;}}
        } else {
          hurtPlayer(1);break;
        }
      }
    }
    if(b.alive&&p.x+p.w>b.x+3&&p.x<b.x+b.w-3&&p.y+p.h>b.y&&p.y<b.y+b.h){
      if((li===0||li===1||li===5)&&p.vy>1&&p.y+p.h<b.y+18){damageBoss(1);p.vy=-11;addPart(b.x+b.w/2,b.y,'#44ff44',10,5);}
      else if(li===6&&p.vy>1&&p.y+p.h<b.y+18){
        // Check if head spikes are active — if so, player gets hurt instead
        if(b.headSpikeTimer>0){
          hurtPlayer(1);
        } else {
          damageBoss(1);p.vy=-11;
          addPart(b.x+b.w/2,b.y,'#ff88cc',10,5);
          // Trigger head spikes for 2 seconds (120 frames)
          b.headSpikeTimer=120;
          addPart(b.x+b.w/2,b.y-8,'#ff2266',12,5);
        }
      }
      else if(li===2&&p.vy<0&&p.y>b.y+b.h-14){damageBoss(2);p.vy=6;addPart(b.x+b.w/2,b.y+b.h,'#88ccff',10,5);}
      else if(li===7){hurtPlayer(1);}
      else if(li>2&&li<5)hurtPlayer(1);
      else if(li===3||li===4)hurtPlayer(1);
    }
  }
  for(var i=b.projs.length-1;i>=0;i--){var pr=b.projs[i];if(pr.fromPlayer){pr.x+=pr.vx;pr.y+=pr.vy;if(pr.y>1100||pr.x<-80||pr.x>W+80)b.projs.splice(i,1);continue;}pr.x+=pr.vx;pr.y+=pr.vy;if(pr.grav)pr.vy+=0.28;if(pr.rot!==undefined)pr.rot+=pr.rotV;if(pr.y>1100||pr.y<-350||pr.x<-80||pr.x>W+80)b.projs.splice(i,1);}
  for(var i=b.minions.length-1;i>=0;i--){
    var m=b.minions[i];m.x+=m.vx;
    // Bounce mini-bosses off walls
    if(m.x<0){m.x=0;m.vx*=-1;}
    if(m.x+m.w>W){m.x=W-m.w;m.vx*=-1;}
    if(m.x<-20||m.x>W+20)b.minions.splice(i,1);
  }
  // HUD
  document.getElementById('hlv').textContent=LVNAMES[li]||('Mercury - Boss '+(li-4));
  document.getElementById('hhp').textContent='HP:\u2665'.repeat(Math.max(0,p.hp))+'\u2661'.repeat(Math.max(0,p.maxHp-p.hp));
  var bhpTxt=b.alive?(li===7?('Missiles: '+b.missilesHit+'/8'):b.name+' '+'\u25ae'.repeat(b.hp)):'SLAIN';
  document.getElementById('hbhp').textContent=bhpTxt;
  var msg='';
  if(soulsteel)msg='\u2605 SOUL STEEL';
  else if(li===2||li===7){msg=!p.hasJetpack?'\u2605 Jetpack ahead!':p.jetFuel<JET_MAX*0.2?'LOW FUEL!':(li===7?('Missiles: '+p.missilesCarried+'/8 | aim+Z'):'Fly under boss');}
  else if(li===3)msg='Z=Sword';else if(li===4)msg='Z=Magic';
  document.getElementById('hmsg').textContent=msg;
}

// ── DRAWING ───────────────────────────────────────────────────────────────────
function fr(x,y,w,h,c){ct.fillStyle=c;ct.fillRect(Math.round(x),Math.round(y),Math.max(1,Math.ceil(w)),Math.max(1,Math.ceil(h)));}
function circ(x,y,r,c){ct.fillStyle=c;ct.beginPath();ct.arc(Math.round(x),Math.round(y),r,0,Math.PI*2);ct.fill();}

function drawBg(li,camY,tick){
  // Sky gradient
  var GTOP=['#0a0a05','#180e06','#0d2a4a','#c8e8ff','#000005'];
  var GBOT=['#12100a','#22140a','#1a4a7a','#e8f8ff','#00000e'];
  ct.fillStyle=GTOP[li];ct.fillRect(0,0,W,H*0.6);
  ct.fillStyle=GBOT[li];ct.fillRect(0,H*0.6,W,H*0.4);

  if(li===0){
    // Sewer: brick walls, dripping goo, pipes
    ct.fillStyle='rgba(15,20,5,0.7)';
    for(var i=0;i<W;i+=68)ct.fillRect(i,0,22,H);
    // Brick pattern on walls
    ct.fillStyle='rgba(30,40,10,0.5)';
    for(var row=0;row<H;row+=18){for(var col=0;col<W;col+=68){var off=row%36===0?0:11;ct.fillRect(col+off,row,20,16);}}
    // Drips
    ct.fillStyle='rgba(80,200,30,0.6)';
    for(var i=0;i<6;i++){var dx=22+i*50,dy=(tick*0.8+i*123)%260;ct.fillRect(dx,dy,3,12+i*4);}
    // Pipe openings
    ct.fillStyle='#1a2a08';
    for(var i=0;i<4;i++){ct.beginPath();ct.arc(i*90+30,80+i*60,14,0,Math.PI*2);ct.fill();}
    ct.fillStyle='#2a4a10';
    for(var i=0;i<4;i++){ct.beginPath();ct.arc(i*90+30,80+i*60,10,0,Math.PI*2);ct.fill();}
  } else if(li===1){
    // House: wallpaper pattern + window
    ct.fillStyle='rgba(60,30,10,0.3)';
    for(var y=camY%36;y<H;y+=36)for(var x=0;x<W;x+=36){ct.fillRect(x+4,y+4,28,28);}
    ct.fillStyle='rgba(80,40,10,0.15)';
    for(var y=camY%36;y<H;y+=36)for(var x=0;x<W;x+=36){ct.strokeStyle='rgba(100,50,10,0.2)';ct.strokeRect(x,y,36,36);}
    // Windows
    fr(240,80,60,50,'#8ab8e8');fr(244,84,52,42,'#aaccff');
    fr(240,80,60,6,'#8a6020');fr(238,78,64,6,'#6a4810');
    // Curtains
    fr(240,80,10,50,'rgba(180,80,80,0.7)');fr(290,80,10,50,'rgba(180,80,80,0.7)');
    // Light from window
    ct.fillStyle='rgba(255,240,180,0.05)';
    ct.beginPath();ct.moveTo(268,130);ct.lineTo(200,H);ct.lineTo(330,H);ct.fill();
  } else if(li===2){
    // Sky: layered clouds, sun rays
    ct.fillStyle='rgba(255,255,255,0.12)';
    for(var i=0;i<7;i++){var cx=30+i*48,cy=(80+i*40+camY*0.05)%H;ct.beginPath();ct.arc(cx,cy,24+i*4,0,Math.PI*2);ct.fill();ct.beginPath();ct.arc(cx+22,cy-6,18,0,Math.PI*2);ct.fill();ct.beginPath();ct.arc(cx-18,cy-4,16,0,Math.PI*2);ct.fill();}
    // Sun
    ct.fillStyle='rgba(255,240,100,0.15)';
    for(var i=0;i<12;i++){ct.save();ct.translate(260,60);ct.rotate(i*Math.PI/6+tick*0.005);ct.fillRect(-2,20,4,30);ct.restore();}
    ct.fillStyle='rgba(255,240,80,0.5)';ct.beginPath();ct.arc(260,60,22,0,Math.PI*2);ct.fill();

  }

function drawParticles(){
  for(var i=0;i<G.parts.length;i++){
    var pt=G.parts[i];
    ct.globalAlpha=Math.max(0,pt.life);
    ct.fillStyle=pt.col;
    var ps=Math.max(1,Math.round(pt.life*5));
    ct.fillRect(Math.round(pt.x),Math.round(pt.y),ps,ps);
  }
  ct.globalAlpha=1;
}

    // Left arm
    ct.beginPath();ct.moveTo(wx+8,wy+h*0.4);ct.quadraticCurveTo(wx-20,wy+h*0.6+armSwing,wx-10,wy+h+10);ct.quadraticCurveTo(wx+15,wy+h+20,wx+30,wy+h+10);ct.quadraticCurveTo(wx+20,wy+h*0.6+armSwing,wx+w*0.3,wy+h*0.4);ct.fill();
    // Right arm
    ct.beginPath();ct.moveTo(wx+w-8,wy+h*0.4);ct.quadraticCurveTo(wx+w+20,wy+h*0.6-armSwing,wx+w+10,wy+h+10);ct.quadraticCurveTo(wx+w-15,wy+h+20,wx+w-30,wy+h+10);ct.quadraticCurveTo(wx+w-20,wy+h*0.6-armSwing,wx+w*0.7,wy+h*0.4);ct.fill();
    // Face — vacant, not looking at player
    fr(wx+14,wy+20,14,10,fl?'#aaa':'#cccccc');fr(wx+15,wy+21,12,8,'#000000');
    fr(wx+52,wy+20,14,10,fl?'#aaa':'#cccccc');fr(wx+53,wy+21,12,8,'#000000');
    // Flat mouth (not aggressive)
    fr(wx+22,wy+40,36,4,'#cccccc');
    // Impact craters where arms hit
    if(armSwing>15||armSwing<-15){addPart(wx-5,wy+h+8,'#cc8844',3,4,false);addPart(wx+w+5,wy+h+8,'#cc8844',3,4,false);}
    // HP/missile bar
    ct.fillStyle='#1a0000';ct.fillRect(x,y-16,w,8);
    var mfrac=b.missilesHit/8;
    ct.fillStyle=mfrac>=1?'#ff4400':'#ffaa00';ct.fillRect(x,y-16,Math.round(w*mfrac),8);
    ct.fillStyle='#ffffff';ct.font='bold 7px monospace';ct.fillText('Missiles: '+b.missilesHit+'/8',x,y-18);
  }
}

function drawMercuryBg(camY,tick){
  // Orange/rust Mercury surface
  ct.fillStyle='#1a0a00';ct.fillRect(0,0,W,H/2);
  ct.fillStyle='#2a1200';ct.fillRect(0,H/2,W,H/2);
  // Mercury surface texture — craters in background
  ct.fillStyle='rgba(80,30,0,0.4)';
  for(var i=0;i<6;i++){var cx2=(i*110+60)%W,cy2=H-80+i*20;ct.beginPath();ct.ellipse(cx2,cy2,30+i*8,12,0,0,Math.PI*2);ct.fill();}
  // Distant mountains
  ct.fillStyle='rgba(60,25,5,0.6)';
  for(var i=0;i<5;i++){ct.beginPath();ct.moveTo(i*80,H);ct.lineTo(i*80+40,H-80-i*20);ct.lineTo(i*80+80,H);ct.fill();}
  // Stars (Mercury has no atmosphere)
  ct.fillStyle='#ffffff';
  for(var i=0;i<50;i++){var sx=(i*137+3)%W,sy=(i*97+camY*0.02)%H;ct.fillRect(sx,Math.round(sy%H),1,1);}
  // Sun visible (closer to sun)
  ct.fillStyle='rgba(255,200,50,0.7)';ct.beginPath();ct.arc(W-30,40,24,0,Math.PI*2);ct.fill();
  ct.fillStyle='rgba(255,230,100,0.4)';ct.beginPath();ct.arc(W-30,40,36,0,Math.PI*2);ct.fill();
}

function drawMercuryPlat(pl,tick){
  // Rocky orange Mercury surface platforms
  fr(pl[0],pl[1],pl[2],pl[3],'#6a2a00');
  fr(pl[0],pl[1],pl[2],4,'#aa4400');
  ct.fillStyle='rgba(180,80,20,0.5)';
  for(var i=4;i<pl[2]-2;i+=12){ct.fillRect(pl[0]+i,pl[1],8,4);}
  ct.fillStyle='rgba(255,140,60,0.2)';ct.fillRect(pl[0],pl[1],pl[2],2);
}

function drawScene(){
  if(ROCKET){drawRocket();return;}
  if(!G){
    ct.fillStyle='#050510';ct.fillRect(0,0,W,H);
    ct.fillStyle='#fff';for(var i=0;i<60;i++){ct.fillRect((i*137)%W,(i*97)%H,i%5===0?2:1,i%5===0?2:1);}
    var t=Date.now()/1000;
    for(var i=0;i<8;i++){var sx=40+i*35,sy=150+Math.sin(t+i)*20;ct.fillStyle='rgba(255,220,100,'+(0.4+0.3*Math.sin(t*2+i))+')';ct.beginPath();for(var s=0;s<10;s++){var a=s*Math.PI/5-Math.PI/2,r=s%2===0?10:4;ct.lineTo(sx+Math.cos(a)*r,sy+Math.sin(a)*r);}ct.closePath();ct.fill();}
    return;
  }
  var li=G.li,camY=Math.round(G.cam),b=G.boss,p=G.player,tick=G.tick;
  if(li>=5){drawMercuryBg(camY,tick);}else{drawBg(li,camY,tick);}
  ct.save();ct.translate(0,-camY);
  // Platforms
  for(var i=0;i<G.plats.length;i++){
    if(li>=5)drawMercuryPlat(G.plats[i],tick);
    else drawPlat(G.plats[i],li,tick);
  }
  // Jetpack pickup
  drawJetPickup(G.jetpickup);
  // Heaven gates
  if(li===3)drawHeavenGates(G.plats[G.plats.length-1]);
  // Missiles (level 7)
  if(li===7&&G.missiles){
    for(var i=0;i<G.missiles.length;i++){
      var ms=G.missiles[i];
      var mx=Math.round(ms.x),my=Math.round(ms.y);
      if(ms.collected){
        // Draw faint ghost + countdown timer so player knows when it respawns
        if(ms.respawnTimer>0){
          var pct=ms.respawnTimer/300;
          ct.fillStyle='rgba(255,200,0,'+(0.08+0.05*Math.sin(tick*0.15+i))+')';
          ct.beginPath();ct.arc(mx+8,my+10,18,0,Math.PI*2);ct.fill();
          // Arc countdown ring
          ct.strokeStyle='rgba(255,180,0,0.35)';ct.lineWidth=2;
          ct.beginPath();ct.arc(mx+8,my+10,12,-Math.PI/2,-Math.PI/2+(1-pct)*Math.PI*2);ct.stroke();
          ct.lineWidth=1;
          var secLeft=Math.ceil(ms.respawnTimer/60);
          ct.fillStyle='rgba(255,200,80,0.5)';ct.font='bold 8px monospace';ct.textAlign='center';
          ct.fillText(secLeft,mx+8,my+14);ct.textAlign='left';
        }
        continue;
      }
      var glow=0.5+0.5*Math.sin(tick*0.12+i*1.2);
      ct.fillStyle='rgba(255,200,0,'+glow*0.4+')';ct.beginPath();ct.arc(mx+8,my+10,18,0,Math.PI*2);ct.fill();
      // Missile body
      fr(mx+5,my+2,6,14,'#cccccc');fr(mx+6,my+3,4,12,'#eeeeee');
      // Nose
      ct.fillStyle='#ff4400';ct.beginPath();ct.moveTo(mx+8,my);ct.lineTo(mx+5,my+4);ct.lineTo(mx+11,my+4);ct.fill();
      // Fins
      fr(mx+3,my+12,3,5,'#ff4400');fr(mx+10,my+12,3,5,'#ff4400');
      // Glow dot
      ct.fillStyle='rgba(255,220,50,'+(0.7+0.3*glow)+')';ct.beginPath();ct.arc(mx+8,my+8,3,0,Math.PI*2);ct.fill();
    }
  }
  // Boss
  drawBoss(b,li,tick);
  // Draw Mercury bosses if not handled by existing drawBoss
  if(li>=5){drawMercuryBoss(b,li,tick);}
  // Projectiles
  for(var i=0;i<b.projs.length;i++){
    var prj=b.projs[i];
    if(prj.fromPlayer){
      // Draw player missile
      var pmx=Math.round(prj.x),pmy=Math.round(prj.y);
      ct.fillStyle='#ff4400';ct.beginPath();ct.arc(pmx,pmy,prj.r,0,Math.PI*2);ct.fill();
      ct.fillStyle='#ffaa00';ct.beginPath();ct.arc(pmx-1,pmy-1,prj.r*0.4,0,Math.PI*2);ct.fill();
      addPart(pmx,pmy,'#ff8800',1,2);
    } else {
      drawProj(prj,tick);
    }
  }
  // Minions
  for(var i=0;i<b.minions.length;i++)drawMinion(b.minions[i],tick);
  // Player
  drawPlayer(p,li,tick);
  // Particles
  drawParticles();
  ct.restore();
  // Fuel bar
  if((li===2||li===7)&&p.hasJetpack){
    ct.fillStyle='rgba(0,0,0,0.5)';ct.fillRect(6,6,158,12);
    ct.fillStyle=p.jetFuel<JET_MAX*0.2?'#ff3311':'#22aaff';
    ct.fillRect(7,7,Math.round((p.jetFuel/p.jetMax)*154),10);
    ct.fillStyle='rgba(255,255,255,0.2)';ct.fillRect(7,7,Math.round((p.jetFuel/p.jetMax)*154),4);
    ct.fillStyle='#eee';ct.font='bold 8px monospace';ct.fillText('FUEL',9,16);
  }
  // Mouse aim indicator for level 7 missiles
  if(li===7&&p.missilesCarried>0&&G.bossArea){
    // Draw aim line from player toward mouse (in screen coords)
    var px3=Math.round(p.x+8)-0, py3=Math.round(p.y+14)-camY;
    var worldMouseX2=MOUSE.x;
    var worldMouseY2=MOUSE.y;
    var aimDx=worldMouseX2-px3,aimDy=worldMouseY2-py3;
    var aimDist=Math.sqrt(aimDx*aimDx+aimDy*aimDy)||1;
    // Dashed trajectory line
    ct.save();
    ct.strokeStyle='rgba(255,100,0,0.7)';ct.lineWidth=2;ct.setLineDash([6,4]);
    ct.beginPath();ct.moveTo(px3,py3);ct.lineTo(worldMouseX2,worldMouseY2);ct.stroke();
    ct.setLineDash([]);
    // Arrowhead at mouse
    var ang2=Math.atan2(aimDy,aimDx);
    ct.fillStyle='rgba(255,100,0,0.9)';
    ct.beginPath();ct.moveTo(worldMouseX2,worldMouseY2);
    ct.lineTo(worldMouseX2-Math.cos(ang2-0.4)*12,worldMouseY2-Math.sin(ang2-0.4)*12);
    ct.lineTo(worldMouseX2-Math.cos(ang2+0.4)*12,worldMouseY2-Math.sin(ang2+0.4)*12);
    ct.closePath();ct.fill();
    // Crosshair at mouse
    ct.strokeStyle='rgba(255,150,0,0.8)';ct.lineWidth=1.5;
    ct.beginPath();ct.arc(worldMouseX2,worldMouseY2,10,0,Math.PI*2);ct.stroke();
    ct.beginPath();ct.moveTo(worldMouseX2-15,worldMouseY2);ct.lineTo(worldMouseX2+15,worldMouseY2);ct.stroke();
    ct.beginPath();ct.moveTo(worldMouseX2,worldMouseY2-15);ct.lineTo(worldMouseX2,worldMouseY2+15);ct.stroke();
    // Missile count indicator near player
    ct.fillStyle='#ffdd44';ct.font='bold 10px monospace';ct.textAlign='center';
    ct.fillText('\ud83d\ude80 '+p.missilesCarried,px3,py3-20);ct.textAlign='left';
    ct.restore();
  }
  if(G.state==='dead'){ct.fillStyle='rgba(255,30,30,0.2)';ct.fillRect(0,0,W,H);}
}

function loop(){update();drawScene();requestAnimationFrame(loop);}

// Show title screen overlay
(function(){
  var ov=document.getElementById('titleOv');
  ov.style.pointerEvents='auto';
  ov.innerHTML=
    '<div style="font-size:26px;font-weight:bold;color:#ffdd44;font-family:monospace;letter-spacing:3px;text-shadow:0 0 20px rgba(255,200,0,0.5)">BOSS FIGHTER</div>'+
    '<div style="font-size:11px;color:#666;font-family:monospace;margin-top:-6px">5 levels \u2022 5 bosses \u2022 jetpacks \u2022 magic</div>'+
    '<div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">'+
      '<button id="btnStart" style="padding:11px 36px;background:#ffdd44;color:#111;border:none;font-family:monospace;font-size:14px;font-weight:bold;cursor:pointer;border-radius:6px;letter-spacing:1px">Start Game</button>'+
      '<button id="btnSoul" style="padding:11px 36px;background:linear-gradient(135deg,#330066,#660099);color:#cc88ff;border:2px solid #8844cc;font-family:monospace;font-size:14px;font-weight:bold;cursor:pointer;border-radius:6px;letter-spacing:1px">\u2605 Soul Steel \u2605</button>'+
    '</div>'+
    '<div id="soulDesc" style="font-size:10px;color:#555;font-family:monospace;text-align:center;padding:0 24px;max-width:260px;display:none">Die once and you restart from Level 1. No second chances.</div>';
  document.getElementById('btnStart').onclick=function(){soulsteel=false;G=null;startLevel(0);};
  document.getElementById('btnSoul').onclick=function(){soulsteel=true;G=null;startLevel(0);};
  // Hover tooltip on Soul Steel
  document.getElementById('btnSoul').onmouseenter=function(){document.getElementById('soulDesc').style.display='block';};
  document.getElementById('btnSoul').onmouseleave=function(){document.getElementById('soulDesc').style.display='none';};
})();

loop();
</script>
